<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4f0ff"/>
      <stop offset="40%"  stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#004488"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#020208"/>

  <!-- Stars -->
  <circle cx="55"  cy="55"  r="2.2" fill="#99bbff" opacity="0.9"/>
  <circle cx="460" cy="75"  r="3"   fill="#c8dff0"/>
  <circle cx="90"  cy="430" r="2"   fill="#6677aa"/>
  <circle cx="445" cy="390" r="2.5" fill="#8899ff"/>
  <circle cx="400" cy="130" r="1.8" fill="#6677aa"/>
  <circle cx="130" cy="310" r="1.8" fill="#6677aa"/>
  <circle cx="470" cy="260" r="2"   fill="#8899ff" opacity="0.7"/>
  <circle cx="40"  cy="200" r="1.5" fill="#6677aa" opacity="0.6"/>

  <!-- Engine flame -->
  <ellipse cx="185" cy="256" rx="52" ry="12"
           fill="#55ccff" opacity="0.78" filter="url(#glow2)"/>

  <!-- Wings -->
  <path d="M248,228 L190,155 L168,200 L232,222 Z"
        fill="#004f80" stroke="#0077bb" stroke-width="2"/>
  <path d="M248,284 L190,357 L168,312 L232,290 Z"
        fill="#004f80" stroke="#0077bb" stroke-width="2"/>

  <!-- Hull -->
  <path d="M365,256 C344,213 297,186 256,186
           L256,214 C279,221 296,238 290,256
           C296,274 279,291 256,298
           L256,326 C297,326 344,299 365,256Z"
        fill="url(#hull)" stroke="#55ddff" stroke-width="3" filter="url(#glow)"/>

  <!-- Cockpit dome -->
  <ellipse cx="316" cy="250" rx="30" ry="20"
           fill="#aaddff" opacity="0.88" filter="url(#glow)"/>
  <ellipse cx="322" cy="246" rx="14" ry="9"
           fill="white" opacity="0.55"/>

  <!-- Engine nozzle glow -->
  <circle cx="240" cy="256" r="18" fill="#44aaff" filter="url(#glow2)"/>

  <!-- Title text -->
  <text x="256" y="435"
        font-family="Courier New,monospace" font-weight="bold" font-size="60"
        text-anchor="middle" fill="#00e8ff" filter="url(#glow)">HOVER</text>
  <text x="256" y="490"
        font-family="Courier New,monospace" font-weight="bold" font-size="46"
        text-anchor="middle" fill="#00e8ff" opacity="0.75">DODGE</text>
</svg>
