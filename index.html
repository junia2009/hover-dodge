<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVER DODGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden }
#wrap { position:relative; flex-shrink:0 }
#hud { position:absolute; top:0; left:0; pointer-events:none }
</style>
</head>
<body>
<div id="wrap"><canvas id="hud"></canvas></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

'use strict';
const VW = 800, VH = 450;

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
renderer.setSize(VW, VH);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.3;

const wrap = document.getElementById('wrap');
wrap.appendChild(renderer.domElement);

const hudCanvas = document.getElementById('hud');
hudCanvas.width = VW; hudCanvas.height = VH;
const HX = hudCanvas.getContext('2d');

let CSF = 1;
function resize() {
  const s = Math.min(innerWidth / VW, innerHeight / VH);
  renderer.domElement.style.width  = VW * s + 'px';
  renderer.domElement.style.height = VH * s + 'px';
  hudCanvas.style.width  = VW * s + 'px';
  hudCanvas.style.height = VH * s + 'px';
  CSF = s;
}
resize();
addEventListener('resize', resize);

// ── Scene / Camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);

// Perspective camera: positioned so at z=0 the view covers VW×VH exactly
const CAM_Z = 600;
const fovDeg = 2 * Math.atan(VH / 2 / CAM_Z) * (180 / Math.PI);
const camera = new THREE.PerspectiveCamera(fovDeg, VW / VH, 1, 2000);
camera.position.set(0, 0, CAM_Z);

// Canvas → world coords: canvas(0,0) is top-left, y-down; world(0,0) is center, y-up
function W(x, y, z = 0) {
  return new THREE.Vector3(x - VW / 2, VH / 2 - y, z);
}

// ── Post-processing ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(VW, VH), 1.5, 0.65, 0.08);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x112244, 1.2));
const shipLight = new THREE.PointLight(0x0088ff, 4, 140);
scene.add(shipLight);
const rimLight = new THREE.DirectionalLight(0x334488, 0.8);
rimLight.position.set(-1, 1, 2);
scene.add(rimLight);

// ── Shared geometries ─────────────────────────────────────────────────────────
const WALL_W = 26;
const WALL_UNIT_GEOM = new THREE.BoxGeometry(WALL_W, 1, 14);
const WALL_EDGE_GEOM = new THREE.BoxGeometry(WALL_W - 4, 1.8, 14);

// ── Ship builder ──────────────────────────────────────────────────────────────
function buildShipGroup() {
  const g = new THREE.Group();

  // Hull — extruded bezier path (points to +X)
  const hull = new THREE.Shape();
  hull.moveTo(17, 0);
  hull.bezierCurveTo(14, 4, -1, 9, -9, 9);
  hull.lineTo(-9, 5.5);
  hull.bezierCurveTo(-6, 5, -3, 2, -5, 0);
  hull.bezierCurveTo(-3, -2, -6, -5, -9, -5.5);
  hull.lineTo(-9, -9);
  hull.bezierCurveTo(-1, -9, 14, -4, 17, 0);

  const hullMesh = new THREE.Mesh(
    new THREE.ExtrudeGeometry(hull, { depth: 5, bevelEnabled: true, bevelSize: 0.7, bevelThickness: 0.7, bevelSegments: 2 }),
    new THREE.MeshPhongMaterial({ color: 0x0088cc, emissive: 0x001a33, shininess: 140, specular: 0x66ccff })
  );
  hullMesh.position.z = -2.5; // center hull depth around z=0
  g.add(hullMesh);

  // Wings (y negated from canvas coords for Three.js y-up)
  for (const pts of [
    [[2,5],[-9,16],[-13,8],[-9,9]],    // top wing
    [[2,-5],[-9,-16],[-13,-8],[-9,-9]] // bottom wing
  ]) {
    const ws = new THREE.Shape();
    ws.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ws.lineTo(pts[i][0], pts[i][1]);
    ws.closePath();
    const wm = new THREE.Mesh(
      new THREE.ExtrudeGeometry(ws, { depth: 2.5, bevelEnabled: false }),
      new THREE.MeshPhongMaterial({ color: 0x004f80, emissive: 0x000d1a, shininess: 50 })
    );
    wm.position.z = -1.25;
    g.add(wm);
  }

  // Cockpit dome
  const ck = new THREE.Mesh(
    new THREE.SphereGeometry(5, 20, 14),
    new THREE.MeshPhongMaterial({ color: 0xc0eaff, emissive: 0x002233, shininess: 220, specular: 0xffffff, transparent: true, opacity: 0.88 })
  );
  ck.position.set(5, 0, 5); ck.scale.set(1.45, 0.85, 0.72);
  g.add(ck);

  // Engine nozzle glow sphere (emissive → bloomed)
  const eng = new THREE.Mesh(
    new THREE.SphereGeometry(4, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0x44aaff })
  );
  eng.position.set(-16, 0, 2.5); eng.name = 'engine';
  g.add(eng);

  // Flame cone — rotation.z=π/2 so tip points to -X (trailing behind ship)
  const flameMesh = new THREE.Mesh(
    new THREE.ConeGeometry(3, 16, 8),
    new THREE.MeshBasicMaterial({ color: 0x55ccff, transparent: true, opacity: 0.75, side: THREE.DoubleSide })
  );
  flameMesh.rotation.z = Math.PI / 2;
  flameMesh.position.set(-16, 0, 2.5); flameMesh.name = 'flame';
  g.add(flameMesh);

  g.scale.setScalar(1.5);
  return g;
}

const shipGroup = buildShipGroup();
scene.add(shipGroup);

// ── Stars ─────────────────────────────────────────────────────────────────────
const STAR_N = 150;
const starPos = new Float32Array(STAR_N * 3);
const starSpd = new Float32Array(STAR_N);
for (let i = 0; i < STAR_N; i++) {
  starPos[i*3]   = (Math.random() - 0.5) * VW;
  starPos[i*3+1] = (Math.random() - 0.5) * VH;
  starPos[i*3+2] = -40 - Math.random() * 80;
  starSpd[i]     = 0.06 + Math.random() * 0.38;
}
const starGeom = new THREE.BufferGeometry();
starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeom,
  new THREE.PointsMaterial({ color: 0x99bbff, size: 1.8, sizeAttenuation: true })));

// ── Grid ──────────────────────────────────────────────────────────────────────
function buildGrid() {
  const pts = [];
  for (let x = 0; x <= VW + 80; x += 80) { pts.push(x-VW/2,-VH/2,-18, x-VW/2,VH/2,-18); }
  for (let y = 0; y <= VH; y += 60)       { pts.push(-VW/2,VH/2-y,-18, VW/2,VH/2-y,-18); }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
  return new THREE.LineSegments(geom,
    new THREE.LineBasicMaterial({ color: 0x26399b, transparent: true, opacity: 0.07 }));
}
const gridMesh = buildGrid();
scene.add(gridMesh);

// ── Nebula blobs ──────────────────────────────────────────────────────────────
for (const [nx, ny, nr, col] of [[160,70,110,0x220066],[660,370,100,0x001f88],[400,220,85,0x003355]]) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(nr, 10, 10),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.045, depthWrite: false })
  );
  m.position.copy(W(nx, ny, -45));
  scene.add(m);
}

// ── Speed lines ───────────────────────────────────────────────────────────────
const SL_N = 32;
const slData = Array.from({ length: SL_N }, () => ({
  x: Math.random() * VW, y: Math.random() * VH,
  len: 50 + Math.random() * 130, spd: 5 + Math.random() * 7,
}));
const slPos = new Float32Array(SL_N * 6);
const slGeom = new THREE.BufferGeometry();
slGeom.setAttribute('position', new THREE.BufferAttribute(slPos, 3));
const slMat = new THREE.LineBasicMaterial({ color: 0x99ccff, transparent: true, opacity: 0 });
scene.add(new THREE.LineSegments(slGeom, slMat));

// ── Ribbon trail ──────────────────────────────────────────────────────────────
const RIB_MAX = 30;
const ribPos = new Float32Array(RIB_MAX * 3);
const ribGeom = new THREE.BufferGeometry();
ribGeom.setAttribute('position', new THREE.BufferAttribute(ribPos, 3));
ribGeom.setDrawRange(0, 0);
const ribbonLine = new THREE.Line(ribGeom,
  new THREE.LineBasicMaterial({ color: 0x0099ff, transparent: true, opacity: 0.7 }));
scene.add(ribbonLine);

// ── Wall mesh pool ────────────────────────────────────────────────────────────
const wallMeshMap = new Map();

function getOrCreateWall(w) {
  if (wallMeshMap.has(w)) return wallMeshMap.get(w);
  const grp = new THREE.Group();
  const topM = new THREE.Mesh(WALL_UNIT_GEOM,
    new THREE.MeshPhongMaterial({ color: 0x0e0c38, emissive: 0x050320, shininess: 30 }));
  const botM = new THREE.Mesh(WALL_UNIT_GEOM,
    new THREE.MeshPhongMaterial({ color: 0x0e0c38, emissive: 0x050320, shininess: 30 }));
  const edgeT = new THREE.Mesh(WALL_EDGE_GEOM,
    new THREE.MeshBasicMaterial({ color: 0xccaaff }));
  const edgeB = new THREE.Mesh(WALL_EDGE_GEOM,
    new THREE.MeshBasicMaterial({ color: 0xccaaff }));
  topM.name='top'; botM.name='bot'; edgeT.name='edgeT'; edgeB.name='edgeB';
  grp.add(topM, botM, edgeT, edgeB);
  scene.add(grp);
  const rec = { grp, topM, botM, edgeT, edgeB };
  wallMeshMap.set(w, rec);
  return rec;
}

function removeWallMesh(w) {
  const rec = wallMeshMap.get(w);
  if (rec) { scene.remove(rec.grp); wallMeshMap.delete(w); }
}

// ── Enemy mesh pool ───────────────────────────────────────────────────────────
const enemyMeshMap = new Map();

function getOrCreateEnemy(e) {
  if (enemyMeshMap.has(e)) return enemyMeshMap.get(e);
  const grp = new THREE.Group();
  if (e.type === 'b') {
    // Plasma orb
    grp.add(new THREE.Mesh(
      new THREE.SphereGeometry(8, 18, 18),
      new THREE.MeshPhongMaterial({ color: 0xff5522, emissive: 0xff2200, shininess: 80 })
    ));
    const r1 = new THREE.Mesh(new THREE.TorusGeometry(12, 0.9, 4, 36),
      new THREE.MeshBasicMaterial({ color: 0xff7744 }));
    r1.name = 'r1';
    const r2 = new THREE.Mesh(new THREE.TorusGeometry(9, 0.7, 4, 36),
      new THREE.MeshBasicMaterial({ color: 0xff4422 }));
    r2.name = 'r2'; r2.rotation.x = Math.PI / 3;
    grp.add(r1, r2);
  } else {
    // Seeker body (arrow pointing +X)
    const bs = new THREE.Shape();
    bs.moveTo(13,0); bs.lineTo(-5,-8); bs.lineTo(-2,-3);
    bs.lineTo(-5,0); bs.lineTo(-2,3); bs.lineTo(-5,8); bs.closePath();
    const body = new THREE.Mesh(
      new THREE.ExtrudeGeometry(bs, { depth: 4, bevelEnabled: true, bevelSize: 0.5, bevelThickness: 0.5, bevelSegments: 1 }),
      new THREE.MeshPhongMaterial({ color: 0xff9900, emissive: 0xaa4400, shininess: 60 })
    );
    grp.add(body);
    // Wings
    for (const [sy] of [[1],[-1]]) {
      const ws = new THREE.Shape();
      ws.moveTo(1,-3*sy); ws.lineTo(-8,-13*sy); ws.lineTo(-11,-6*sy); ws.closePath();
      grp.add(new THREE.Mesh(
        new THREE.ExtrudeGeometry(ws, { depth: 2, bevelEnabled: false }),
        new THREE.MeshPhongMaterial({ color: 0x883300, emissive: 0x221100, shininess: 30 })
      ));
    }
    // Eye
    const eye = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffff55 }));
    eye.position.set(5, 0, 4); eye.name = 'eye';
    grp.add(eye);
  }
  grp.scale.setScalar(1.2);
  scene.add(grp);
  enemyMeshMap.set(e, grp);
  return grp;
}

function removeEnemyMesh(e) {
  const grp = enemyMeshMap.get(e);
  if (grp) { scene.remove(grp); enemyMeshMap.delete(e); }
}

// ── Sparks ────────────────────────────────────────────────────────────────────
const sparkMeshPool = [];

// ── Input ─────────────────────────────────────────────────────────────────────
const mouse = { x: VW/2, y: VH/2 };
const keys  = {};
renderer.domElement.addEventListener('mousemove', e => {
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) / CSF;
  mouse.y = (e.clientY - r.top)  / CSF;
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = renderer.domElement.getBoundingClientRect(), t = e.touches[0];
  mouse.x = (t.clientX - r.left) / CSF;
  mouse.y = (t.clientY - r.top)  / CSF;
}, { passive: false });
addEventListener('keydown', e => { keys[e.code] = true; if (e.code==='Space') e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Game state ────────────────────────────────────────────────────────────────
let gstate = 'menu';
let score = 0, hiScore = +localStorage.getItem('hd_hi') || 0;
let frame = 0, tick = 0, spd = 3;
let shakeX = 0, shakeY = 0;

const P = { x: 150, y: VH/2, vx: 0, vy: 0, bankAngle: 0, r: 10, ribbon: [], inv: 0 };
let walls = [], enemies = [], sparks = [];

// ── Spawners ──────────────────────────────────────────────────────────────────
function addWall(startX) {
  const margin = 55, gap = Math.max(100, 200 - score * 0.15);
  const gapY = margin + Math.random() * (VH - margin*2 - gap);
  walls.push({ x: startX ?? VW+10, gapY, gap, w: WALL_W, pulse: Math.random()*Math.PI*2 });
}
function addEnemy() {
  const seeker = Math.random() < 0.45;
  const y = 45 + Math.random() * (VH - 90);
  if (seeker) {
    enemies.push({ x: VW+15, y, vx: -(spd+0.8), vy: 0, r: 8, type: 's', pulse: 0, facing: Math.PI, spin: 0 });
  } else {
    enemies.push({ x: VW+15, y, vx: -(spd+2.5+Math.random()*2), vy: (Math.random()-.5)*2.5, r: 7, type: 'b', spin: 0 });
  }
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function startGame() {
  gstate = 'play'; score = frame = 0; spd = 3;
  P.x = 150; P.y = VH/2; P.vx = P.vy = 0; P.bankAngle = 0;
  P.ribbon = []; P.inv = 90;
  for (const w of walls) removeWallMesh(w);
  for (const e of enemies) removeEnemyMesh(e);
  for (const sm of sparkMeshPool) scene.remove(sm);
  sparkMeshPool.length = 0;
  walls = []; enemies = []; sparks = [];
  mouse.x = VW/2; mouse.y = VH/2;
  for (let i = 0; i < 4; i++) addWall(VW + i*265);
}

function die() {
  gstate = 'dead';
  const s = Math.floor(score);
  if (s > hiScore) { hiScore = s; localStorage.setItem('hd_hi', s); }
  shakeX = 12; shakeY = 9;
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*Math.PI*2, v = Math.random()*8+1;
    const sp = {
      x: P.x, y: P.y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      life: 1, sz: 1+Math.random()*4,
      hue: [185,195,210,35,50][Math.floor(Math.random()*5)],
    };
    sparks.push(sp);
    const sm = new THREE.Mesh(
      new THREE.SphereGeometry(sp.sz * 0.8, 5, 5),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${sp.hue},100%,75%)`), transparent: true })
    );
    sm.userData.sp = sp;
    scene.add(sm);
    sparkMeshPool.push(sm);
  }
}

function handleAction() { if (gstate !== 'play') startGame(); }
renderer.domElement.addEventListener('click', handleAction);
renderer.domElement.addEventListener('touchend', e => { e.preventDefault(); handleAction(); });
addEventListener('keydown', e => { if (e.code==='Space') handleAction(); });

// ── Update (game logic) ───────────────────────────────────────────────────────
function update() {
  tick++;
  shakeX *= 0.70; shakeY *= 0.70;
  if (Math.abs(shakeX) < 0.05) shakeX = 0;
  if (Math.abs(shakeY) < 0.05) shakeY = 0;

  // Stars scroll
  const ws = gstate === 'play' ? spd : 2;
  for (let i = 0; i < STAR_N; i++) {
    starPos[i*3] -= starSpd[i] * (ws / 3) * 0.45;
    if (starPos[i*3] < -VW/2) { starPos[i*3] = VW/2; starPos[i*3+1] = (Math.random()-0.5)*VH; }
  }
  starGeom.attributes.position.needsUpdate = true;

  // Speed lines
  const tsl = Math.max(0, (spd - 4.0) / 6.0);
  slMat.opacity = tsl * 0.45;
  for (let i = 0; i < SL_N; i++) {
    const sl = slData[i];
    sl.x -= sl.spd * (ws / 3);
    if (sl.x + sl.len < 0) { sl.x = VW + sl.len; sl.y = Math.random() * VH; }
    const p1 = W(sl.x, sl.y, -8), p2 = W(sl.x + sl.len * Math.min(1, tsl*1.5), sl.y, -8);
    slPos.set([p1.x,p1.y,p1.z, p2.x,p2.y,p2.z], i*6);
  }
  slGeom.attributes.position.needsUpdate = true;

  // Grid offset
  const gOff = (gstate === 'play' ? frame*spd*0.32 : tick*0.55) % 80;
  gridMesh.position.x = -gOff;

  if (gstate !== 'play') return;
  frame++; score += 1/60;
  spd = Math.min(10, 3 + Math.sqrt(score) * 0.35);

  // Player movement
  P.vx += (mouse.x - P.x) * 0.07;
  P.vy += (mouse.y - P.y) * 0.07;
  if (keys['ArrowUp']    || keys['KeyW']) P.vy -= 0.8;
  if (keys['ArrowDown']  || keys['KeyS']) P.vy += 0.8;
  if (keys['ArrowLeft']  || keys['KeyA']) P.vx -= 0.4;
  if (keys['ArrowRight'] || keys['KeyD']) P.vx += 0.4;
  P.vx *= 0.80; P.vy *= 0.80;
  const vm = Math.hypot(P.vx, P.vy);
  if (vm > 11) { P.vx = P.vx/vm*11; P.vy = P.vy/vm*11; }
  P.x = Math.max(P.r, Math.min(VW-P.r, P.x+P.vx));
  P.y = Math.max(P.r, Math.min(VH-P.r, P.y+P.vy));

  const bankTarget = Math.max(-0.40, Math.min(0.40, P.vy * 0.052));
  P.bankAngle += (bankTarget - P.bankAngle) * 0.10;

  P.ribbon.push({ x: P.x, y: P.y });
  if (P.ribbon.length > RIB_MAX) P.ribbon.shift();

  // Walls
  const spacing = Math.max(190, 265 - score*0.4);
  if (!walls.length || walls[walls.length-1].x < VW-spacing) addWall();
  for (const w of walls) { w.x -= spd; w.pulse += 0.042; }
  walls = walls.filter(w => {
    if (w.x + w.w <= -10) { removeWallMesh(w); return false; }
    return true;
  });

  // Enemies
  const eInterval = Math.max(70, 220 - score);
  if (frame % Math.round(eInterval) === 0) addEnemy();
  for (const e of enemies) {
    e.spin += e.type === 'b' ? 0.17 : 0.05;
    if (e.type === 's') {
      const dx = P.x-e.x, dy = P.y-e.y, d = Math.max(1, Math.hypot(dx, dy));
      e.vx += dx/d*0.13; e.vy += dy/d*0.13;
      const em = Math.hypot(e.vx, e.vy), cap = spd+1.8;
      if (em > cap) { e.vx=e.vx/em*cap; e.vy=e.vy/em*cap; }
      e.pulse += 0.08;
      const tf = Math.atan2(dy, dx);
      let df = tf - e.facing;
      while (df >  Math.PI) df -= Math.PI*2;
      while (df < -Math.PI) df += Math.PI*2;
      e.facing += df * 0.09;
    }
    e.x += e.vx; e.y += e.vy;
  }
  enemies = enemies.filter(e => {
    if (e.x<-60 || e.x>VW+70 || e.y<-60 || e.y>VH+60) { removeEnemyMesh(e); return false; }
    return true;
  });

  if (P.inv > 0) { P.inv--; return; }
  for (const w of walls)
    if (P.x+P.r>w.x && P.x-P.r<w.x+w.w)
      if (P.y-P.r<w.gapY || P.y+P.r>w.gapY+w.gap) { die(); return; }
  for (const e of enemies)
    if (Math.hypot(P.x-e.x, P.y-e.y) < P.r+e.r) { die(); return; }
}

// ── Scene sync (game state → Three.js objects) ────────────────────────────────
function syncScene() {
  const hover = Math.sin(tick * 0.067) * 1.7;
  const sk = new THREE.Vector3(shakeX*(Math.random()*2-1), -shakeY*(Math.random()*2-1), 0);

  // Ship
  const flame = shipGroup.getObjectByName('flame');
  const engine = shipGroup.getObjectByName('engine');
  const fl = 10 + Math.abs(Math.sin(tick*0.52))*7 + Math.hypot(P.vx,P.vy)*0.42;
  if (flame) { flame.scale.y = fl / 16; flame.position.x = -16 - fl / 2; }
  if (engine) engine.scale.setScalar(0.7 + Math.abs(Math.sin(tick*0.44))*0.5);

  if (gstate === 'menu') {
    shipGroup.visible = true;
    const mx = VW/2 + Math.sin(tick*0.022)*16;
    const my = VH/2 + 115 + Math.sin(tick*0.04)*8;
    shipGroup.position.copy(W(mx, my, 0));
    shipGroup.rotation.z = Math.sin(tick * 0.04) * 0.08;
    shipLight.position.copy(W(mx, my, 25));
  } else if (P.inv > 0 && tick % 6 < 3) {
    shipGroup.visible = false;
    shipLight.position.copy(W(P.x, P.y, 25));
  } else {
    shipGroup.visible = true;
    shipGroup.position.copy(W(P.x, P.y + hover, 0)).add(sk);
    shipGroup.rotation.z = -P.bankAngle;
    shipLight.position.copy(W(P.x, P.y, 25));
  }

  // Ribbon
  const pts = P.ribbon;
  for (let i = 0; i < RIB_MAX; i++) {
    const pt = pts[i] ?? pts[0] ?? { x: P.x, y: P.y };
    const wp = W(pt.x, pt.y, -2);
    ribPos[i*3] = wp.x; ribPos[i*3+1] = wp.y; ribPos[i*3+2] = wp.z;
  }
  ribGeom.attributes.position.needsUpdate = true;
  ribGeom.setDrawRange(0, pts.length);

  // Walls
  for (const w of walls) {
    const rec = getOrCreateWall(w);
    const cx = w.x + w.w / 2;
    const topH = Math.max(0.01, w.gapY);
    const botH = Math.max(0.01, VH - w.gapY - w.gap);
    const p = 0.68 + Math.sin(w.pulse) * 0.32;

    rec.topM.scale.y = topH;
    rec.topM.position.copy(W(cx, topH / 2, 0));
    rec.botM.scale.y = botH;
    rec.botM.position.copy(W(cx, w.gapY + w.gap + botH / 2, 0));

    rec.edgeT.position.copy(W(cx, w.gapY, 2));
    rec.edgeT.material.color.setRGB(p * 0.8 + 0.2, p * 0.67 * 0.8, 1.0 * p);
    rec.edgeB.position.copy(W(cx, w.gapY + w.gap, 2));
    rec.edgeB.material.color.setRGB(p * 0.8 + 0.2, p * 0.67 * 0.8, 1.0 * p);
  }

  // Enemies
  for (const e of enemies) {
    const grp = getOrCreateEnemy(e);
    grp.position.copy(W(e.x, e.y, 0)).add(sk);
    if (e.type === 'b') {
      const r1 = grp.getObjectByName('r1');
      const r2 = grp.getObjectByName('r2');
      if (r1) r1.rotation.z = e.spin;
      if (r2) r2.rotation.y = e.spin * 1.3;
    } else {
      // facing is canvas-angle (y down), convert to world rotation (y up)
      grp.rotation.z = -e.facing;
    }
  }

  // Sparks
  for (let i = sparkMeshPool.length - 1; i >= 0; i--) {
    const sm = sparkMeshPool[i];
    const sp = sm.userData.sp;
    if (sp.life <= 0) { scene.remove(sm); sm.geometry.dispose(); sm.material.dispose(); sparkMeshPool.splice(i, 1); }
    else { sm.position.copy(W(sp.x, sp.y, 5)).add(sk); sm.material.opacity = Math.pow(sp.life, 1.3); }
  }
  // Advance sparks
  for (const sp of sparks) {
    sp.x += sp.vx; sp.y += sp.vy; sp.vx *= 0.92; sp.vy *= 0.92; sp.life -= 0.014;
  }
  sparks = sparks.filter(s => s.life > 0);

  // Camera shake
  camera.position.x = shakeX * (Math.random()*2-1) * 0.4;
  camera.position.y = -shakeY * (Math.random()*2-1) * 0.4;
}

// ── HUD (2D canvas overlay) ───────────────────────────────────────────────────
function drawHUD() {
  HX.clearRect(0, 0, VW, VH);

  if (gstate === 'menu') {
    HX.textAlign = 'center';
    HX.shadowColor='#00ffff'; HX.shadowBlur=52; HX.fillStyle='#00ffff';
    HX.font='bold 62px monospace'; HX.fillText('HOVER DODGE', VW/2, VH/2-70);
    HX.shadowColor='#8899ff'; HX.shadowBlur=14; HX.fillStyle='#99aaff';
    HX.font='21px monospace'; HX.fillText('壁と敵をよけ続けろ！', VW/2, VH/2-18);
    HX.shadowBlur=0; HX.fillStyle='rgba(145,165,205,0.58)';
    HX.font='14px monospace'; HX.fillText('マウス移動 / 矢印キーで操作', VW/2, VH/2+20);
    const p = 0.5 + Math.sin(tick*0.06)*0.5;
    HX.globalAlpha=p; HX.shadowColor='#ffffff'; HX.shadowBlur=16; HX.fillStyle='#ffffff';
    HX.font='bold 19px monospace'; HX.fillText('クリック または SPACE でスタート', VW/2, VH/2+58);
    HX.globalAlpha=1; HX.shadowBlur=0;
    if (hiScore > 0) {
      HX.shadowColor='#ffdd44'; HX.shadowBlur=10; HX.fillStyle='#ffdd44';
      HX.font='16px monospace'; HX.fillText(`ベストスコア:  ${hiScore} 秒`, VW/2, VH/2+98);
      HX.shadowBlur=0;
    }
    HX.textAlign='left';
    return;
  }

  HX.textAlign='left';
  HX.shadowColor='#00e8ff'; HX.shadowBlur=14; HX.fillStyle='#00e8ff';
  HX.font='bold 22px monospace'; HX.fillText(`SCORE  ${Math.floor(score)}`, 18, 34);
  HX.shadowColor='#ffdd44'; HX.shadowBlur=8; HX.fillStyle='#ffdd44';
  HX.font='bold 16px monospace'; HX.fillText(`BEST   ${hiScore}`, 18, 56);
  const bw=110, bf=Math.max(0,(spd-3)/7)*bw;
  HX.shadowBlur=0; HX.fillStyle='rgba(255,255,255,0.06)'; HX.fillRect(18,64,bw,5);
  const hu=210-(spd-3)/7*140;
  HX.shadowColor=`hsl(${hu},100%,60%)`; HX.shadowBlur=7;
  HX.fillStyle=`hsl(${hu},100%,62%)`; HX.fillRect(18,64,bf,5);
  HX.shadowBlur=0; HX.fillStyle=`hsla(${hu},70%,75%,0.65)`;
  HX.font='10px monospace'; HX.fillText('SPD', 18+bw+5, 70);

  if (gstate === 'dead') {
    HX.fillStyle='rgba(0,0,14,0.62)'; HX.fillRect(0,0,VW,VH);
    HX.textAlign='center';
    HX.shadowColor='#ff2222'; HX.shadowBlur=52; HX.fillStyle='#ff5555';
    HX.font='bold 58px monospace'; HX.fillText('GAME OVER', VW/2, VH/2-52);
    HX.shadowBlur=0; HX.fillStyle='rgba(160,185,215,0.68)';
    HX.font='17px monospace'; HX.fillText('スコア', VW/2, VH/2-12);
    HX.shadowColor='#ffffff'; HX.shadowBlur=14; HX.fillStyle='#ffffff';
    HX.font='bold 32px monospace'; HX.fillText(`${Math.floor(score)} 秒`, VW/2, VH/2+22);
    if (Math.floor(score) >= hiScore && hiScore > 0) {
      const rp = 0.7 + Math.sin(tick*0.1)*0.3;
      HX.globalAlpha=rp; HX.shadowColor='#ffee44'; HX.shadowBlur=24; HX.fillStyle='#ffee55';
      HX.font='bold 22px monospace'; HX.fillText('★  NEW RECORD  ★', VW/2, VH/2+62);
      HX.globalAlpha=1;
    }
    const ep = 0.5 + Math.sin(tick*0.055)*0.5;
    HX.globalAlpha=ep; HX.shadowColor='#aaffaa'; HX.shadowBlur=10; HX.fillStyle='#aaffaa';
    HX.font='18px monospace'; HX.fillText('クリック または SPACE でリトライ', VW/2, VH/2+105);
    HX.globalAlpha=1; HX.shadowBlur=0; HX.textAlign='left';
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
(function loop() {
  update();
  syncScene();
  composer.render();
  drawHUD();
  requestAnimationFrame(loop);
})();
</script>
