<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HOVER DODGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100dvh; overflow:hidden }
#wrap { position:relative }
#hud  { position:absolute; pointer-events:none; z-index:1 }

/* ── 縦画面オーバーレイ ───────────────────────────────────────── */
#rotate-screen {
  display: none;
  /* Use a stable viewport unit. The previous "inset: 0" sized the overlay
     to iOS Safari's *dynamic* visual viewport (dvh), which fluctuates by a
     few pixels as the address bar shows/hides — after several orientation
     toggles those fluctuations stack up and flex-centered content visibly
     jitters up and down. 100svh stays pinned to the "small viewport"
     height (chrome visible) and doesn't follow toolbar transitions. */
  position: fixed; top: 0; left: 0; right: 0;
  height: 100vh;   /* fallback for browsers without svh */
  height: 100svh;
  z-index: 9999;
  background: #02020a;
  color: #00e8ff;
  overflow: hidden;
  font-family: monospace;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
  --sl: env(safe-area-inset-left, 0px);
  --sr: env(safe-area-inset-right, 0px);
}
@media (orientation: portrait) {
  #rotate-screen { display: flex; }
}

/* Animated neon grid background */
#rotate-screen::before {
  content: '';
  position: absolute; inset: -50px;
  background-image:
    linear-gradient(rgba(0,232,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,232,255,0.06) 1px, transparent 1px);
  background-size: 36px 36px;
  animation: rot-grid-shift 6s linear infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes rot-grid-shift {
  to { transform: translate(36px, 36px); }
}

/* CRT scanlines */
#rotate-screen::after {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, rgba(0,232,255,0.05) 0 1px, transparent 1px 4px),
    radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Corner brackets */
.rot-bracket {
  position: absolute;
  width: 26px; height: 26px;
  border: 2px solid #00e8ff;
  box-shadow: 0 0 10px #00e8ff, inset 0 0 6px rgba(0,232,255,0.3);
  animation: rot-bracket-flicker 4.2s ease-in-out infinite;
  z-index: 2;
}
.rot-bracket.tl { top: calc(16px + var(--st)); left: calc(16px + var(--sl)); border-right:none; border-bottom:none; }
.rot-bracket.tr { top: calc(16px + var(--st)); right: calc(16px + var(--sr)); border-left:none;  border-bottom:none; }
.rot-bracket.bl { bottom: calc(16px + var(--sb)); left: calc(16px + var(--sl)); border-right:none; border-top:none; }
.rot-bracket.br { bottom: calc(16px + var(--sb)); right: calc(16px + var(--sr)); border-left:none;  border-top:none; }
@keyframes rot-bracket-flicker {
  0%, 90%, 100% { opacity: 1; }
  92% { opacity: 0.25; }
  94% { opacity: 1; }
  96% { opacity: 0.5; }
}

/* Top chrome */
.rot-chrome-top {
  position: absolute;
  top: calc(56px + var(--st)); left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; align-items: center;
  font-size: 9px; letter-spacing: 2px;
  z-index: 3;
}
.rot-tag {
  border: 1px solid #00e8ff;
  padding: 3px 7px;
  color: #00e8ff;
  background: rgba(0,232,255,0.08);
  box-shadow: 0 0 8px rgba(0,232,255,0.45);
}
.rot-tag-mag {
  border: 1px solid #ff44d6;
  padding: 3px 7px;
  color: #ff66e0;
  background: rgba(255,68,214,0.08);
  box-shadow: 0 0 8px rgba(255,68,214,0.55);
  animation: rot-blink 1.4s steps(2) infinite;
}
.rot-stat {
  color: rgba(160,200,230,0.7);
  border-bottom: 1px dashed rgba(0,232,255,0.4);
  padding-bottom: 2px;
}
@keyframes rot-blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.3; }
}

/* Brand logo (small, above scope) */
.rot-brand {
  font: bold 22px/1 monospace;
  color: #00e8ff;
  letter-spacing: 8px;
  text-shadow: 0 0 12px #00e8ff, 0 0 24px rgba(0,232,255,0.5);
  z-index: 3;
  white-space: nowrap;
  display: flex; align-items: center; gap: 12px;
}
.rot-brand::before, .rot-brand::after {
  content: '';
  width: 24px; height: 1px;
  background: #00e8ff;
  box-shadow: 0 0 6px #00e8ff;
}
/* Tactical scope around phone */
.rot-icon-wrap {
  position: relative;
  width: 240px; height: 240px;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
}
.rot-scope {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.rot-scope.r1 {
  width: 220px; height: 220px;
  border: 1px dashed rgba(0,232,255,0.30);
  border-radius: 50%;
  animation: rot-scope-spin 22s linear infinite;
}
.rot-scope.r2 {
  width: 160px; height: 160px;
  border: 1.5px solid rgba(0,232,255,0.45);
  border-radius: 50%;
  box-shadow: inset 0 0 12px rgba(0,232,255,0.18), 0 0 12px rgba(0,232,255,0.18);
}
@keyframes rot-scope-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* Crosshair lines through center */
.rot-scope.cross-h {
  width: 230px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,232,255,0.55), transparent);
}
.rot-scope.cross-v {
  width: 1px; height: 230px;
  background: linear-gradient(180deg, transparent, rgba(0,232,255,0.55), transparent);
}

/* Tick marks at cardinal points */
.rot-scope.tick {
  width: 8px; height: 2px;
  background: #00e8ff;
  box-shadow: 0 0 4px #00e8ff;
}
.rot-scope.tick.t-n { top: calc(50% - 110px); left: 50%; transform: translate(-50%, -50%) rotate(90deg); }
.rot-scope.tick.t-s { top: calc(50% + 110px); left: 50%; transform: translate(-50%, -50%) rotate(90deg); }
.rot-scope.tick.t-e { top: 50%; left: calc(50% + 110px); transform: translate(-50%, -50%); }
.rot-scope.tick.t-w { top: 50%; left: calc(50% - 110px); transform: translate(-50%, -50%); }

/* Radar sweep */
.rot-scope.sweep {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(0,232,255,0.18) 30deg, rgba(0,232,255,0.45) 50deg, transparent 60deg, transparent 360deg);
  animation: rot-radar-spin 3.2s linear infinite;
  -webkit-mask: radial-gradient(circle, black 50%, transparent 50%);
          mask: radial-gradient(circle, black 50%, transparent 50%);
}
@keyframes rot-radar-spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Pulse rings (kept, but smaller) */
.rot-icon-wrap::before, .rot-icon-wrap::after {
  content: '';
  position: absolute; left: 50%; top: 50%;
  width: 50px; height: 50px;
  border: 1.5px solid #00e8ff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  pointer-events: none;
  animation: rot-pulse-ring 2.8s ease-out infinite;
}
.rot-icon-wrap::after { animation-delay: 1.4s; border-color: #aa44ff; }
@keyframes rot-pulse-ring {
  0%   { width: 50px; height: 50px; opacity: 0.7; }
  100% { width: 200px; height: 200px; opacity: 0; }
}

.rot-phone {
  position: relative;
  width: 46px; height: 78px;
  border: 3px solid #00e8ff;
  border-radius: 10px;
  box-shadow: 0 0 18px #00e8ff66, inset 0 0 8px #00e8ff22;
  animation: phone-tilt 2.6s ease-in-out infinite;
  will-change: transform;
}
.rot-phone::before {
  content: ''; position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 4px; border-radius: 2px;
  background: #00e8ff;
}
.rot-phone::after {
  content: ''; position: absolute;
  bottom: 7px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid #00e8ff;
}
.rot-arrow {
  position: absolute;
  bottom: -30px; right: -30px;
  font-size: 32px; color: #00e8ff;
  text-shadow: 0 0 12px #00e8ff;
  animation: arrow-pulse 2.6s ease-in-out infinite;
  will-change: opacity;
}
@keyframes phone-tilt {
  0%,  20%  { transform: rotate(0deg); }
  55%, 80%  { transform: rotate(90deg); }
  100%      { transform: rotate(0deg); }
}
@keyframes arrow-pulse {
  0%,  20%  { opacity: 0; }
  40%       { opacity: 1; }
  65%, 80%  { opacity: 0.8; }
  100%      { opacity: 0; }
}

/* Glitch title */
.rot-title {
  position: relative;
  font: bold 20px/1.4 monospace;
  color: #00e8ff;
  text-align: center;
  text-shadow: 0 0 14px #00e8ff;
  letter-spacing: 2px;
  z-index: 3;
}
.rot-title::before, .rot-title::after {
  content: attr(data-text);
  position: absolute;
  left: 0; right: 0; top: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}
.rot-title::before {
  color: #ff2bd6;
  text-shadow: 0 0 6px #ff2bd6;
  animation: rot-glitch-r 3.2s steps(1, end) infinite;
}
.rot-title::after {
  color: #44ff99;
  text-shadow: 0 0 6px #44ff99;
  animation: rot-glitch-l 3.2s steps(1, end) infinite;
}
@keyframes rot-glitch-r {
  0%, 91%, 100% { transform: translate(0); opacity: 0; }
  92% { transform: translate(2px, -1px); opacity: 0.7; }
  94% { transform: translate(-1px, 1px); opacity: 0.5; }
  96% { transform: translate(1px, 0); opacity: 0.6; }
}
@keyframes rot-glitch-l {
  0%, 87%, 100% { transform: translate(0); opacity: 0; }
  88% { transform: translate(-2px, 1px); opacity: 0.5; }
  90% { transform: translate(1px, -1px); opacity: 0.7; }
  92% { transform: translate(-1px, 0); opacity: 0.4; }
}

.rot-sub {
  font: 12px/1 monospace;
  color: rgba(160, 200, 230, 0.7);
  text-align: center;
  letter-spacing: 1px;
  z-index: 3;
}
.rot-sub::before { content: '> '; color: #00e8ff; }
.rot-sub::after  { content: '_'; color: #00e8ff; animation: rot-cursor 1s steps(2) infinite; margin-left: 2px; }
@keyframes rot-cursor {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

/* Loading bar (indeterminate sweep) */
.rot-bar-wrap {
  width: 220px; height: 5px;
  border: 1px solid rgba(0,232,255,0.45);
  background: rgba(0,232,255,0.05);
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 8px rgba(0,232,255,0.3), inset 0 0 4px rgba(0,232,255,0.2);
  z-index: 3;
}
.rot-bar-fill {
  position: absolute;
  top: 0; bottom: 0; left: -40%;
  width: 40%;
  background: linear-gradient(90deg, transparent, #00e8ff, #aa44ff, transparent);
  box-shadow: 0 0 10px #00e8ff;
  animation: rot-bar-slide 1.6s ease-in-out infinite;
}
@keyframes rot-bar-slide {
  to { left: 100%; }
}

.rot-version {
  position: absolute;
  bottom: calc(28px + var(--sb)); left: 50%; transform: translateX(-50%);
  font: 10px/1 monospace;
  color: rgba(100,140,180,0.55);
  letter-spacing: 3px;
  z-index: 3;
}

/* Personal record block (game-relevant info) */
.rot-stats-label {
  font: 10px/1 monospace;
  color: rgba(0,232,255,0.55);
  letter-spacing: 5px;
  z-index: 3;
  margin-top: 4px;
}
.rot-stats-best {
  font: bold 28px/1 monospace;
  color: #ffee66;
  text-shadow: 0 0 14px rgba(255,238,102,0.8), 0 0 24px rgba(255,200,68,0.5);
  letter-spacing: 4px;
  z-index: 3;
  font-variant-numeric: tabular-nums;
}
.rot-stats-best .nodata {
  color: rgba(140,170,200,0.4);
  text-shadow: none;
  font-size: 16px;
  letter-spacing: 6px;
}
.rot-stats-best .unit {
  font-size: 14px;
  color: rgba(255,238,102,0.7);
  letter-spacing: 2px;
  margin-left: 4px;
}

/* Phase progression timeline */
.rot-phase-timeline {
  display: flex;
  width: min(320px, calc(100vw - 80px));
  position: relative;
  z-index: 3;
  font-variant-numeric: tabular-nums;
}
.rot-phase-timeline > div {
  flex: 1;
  text-align: center;
  font: bold 10px/1.4 monospace;
  letter-spacing: 1px;
  color: rgba(140,170,200,0.4);
  padding-top: 22px;
  position: relative;
}
.rot-phase-timeline > div .sub {
  display: block;
  font-weight: normal;
  font-size: 8px;
  letter-spacing: 1px;
  margin-top: 2px;
  opacity: 0.85;
}
.rot-phase-timeline > div::before {
  content: '';
  position: absolute;
  top: 7px; left: 0; right: 0;
  height: 1px;
  background: rgba(140,170,200,0.22);
}
.rot-phase-timeline > div:first-child::before { left: 50%; }
.rot-phase-timeline > div:last-child::before  { right: 50%; }
.rot-phase-timeline > div::after {
  content: '';
  position: absolute;
  top: 2px; left: 50%;
  transform: translateX(-50%);
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 1.5px solid rgba(140,170,200,0.45);
  background: #02020a;
  box-sizing: border-box;
  transition: all .25s ease;
}
.rot-phase-timeline > div.reached {
  color: rgba(0,232,255,0.85);
}
.rot-phase-timeline > div.reached::before {
  background: linear-gradient(90deg, #00e8ff, #00e8ff);
  box-shadow: 0 0 6px rgba(0,232,255,0.5);
}
.rot-phase-timeline > div.reached::after {
  background: #00e8ff;
  border-color: #00e8ff;
  box-shadow: 0 0 8px #00e8ff;
}
.rot-phase-timeline > div.current {
  color: #ffee66;
  text-shadow: 0 0 8px rgba(255,238,102,0.7);
}
.rot-phase-timeline > div.current::after {
  background: #ffee66;
  border-color: #ffee66;
  box-shadow: 0 0 12px #ffee66;
  width: 13px; height: 13px;
  top: 1px;
  animation: rot-blink 1.4s steps(2) infinite;
}

/* Tagline below brand */
.rot-tagline {
  font: 11px/1.4 monospace;
  color: rgba(170,200,230,0.78);
  letter-spacing: 5px;
  z-index: 3;
  margin-top: -8px;
  text-align: center;
}

/* ── Pulse skill button ──────────────────────────────────────────────── */
#pulse-btn {
  position: absolute; right: 18px; bottom: 18px;
  width: 78px; height: 78px; border-radius: 50%;
  border: 2px solid rgba(0, 200, 255, 0.30);
  background: rgba(0, 200, 255, 0.06);
  color: rgba(0, 200, 255, 0.35);
  font: bold 13px/1 monospace;
  letter-spacing: 1px;
  cursor: pointer; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  -webkit-user-select: none; user-select: none;
  transition: border-color 0.25s, color 0.25s, box-shadow 0.25s, transform 0.1s;
  pointer-events: auto;
}
#pulse-btn.ready {
  border-color: #00e8ff; color: #00e8ff;
  box-shadow: 0 0 22px #00e8ff66;
}
#pulse-btn:active { transform: scale(0.94); }
#pulse-sub { font-size: 9px; opacity: 0.7; }

/* ── Start / Retry button (shared style) ─────────────────────────────── */
#start-btn, #retry-btn {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 46px;
  border-radius: 999px;
  border: 2px solid #00e8ff;
  background: rgba(0, 200, 255, 0.10);
  color: #00e8ff;
  font: bold 22px/1 monospace;
  letter-spacing: 4px;
  cursor: pointer;
  z-index: 3;
  box-shadow: 0 0 22px #00e8ff66, inset 0 0 10px #00e8ff33;
  text-shadow: 0 0 12px #00e8ff;
  -webkit-user-select: none; user-select: none;
  pointer-events: auto;
  display: none;
  animation: start-pulse 1.6s ease-in-out infinite;
  transition: background 0.15s, transform 0.1s;
}
#start-btn { top: 64%; }
#retry-btn { top: 76%; padding: 12px 40px; font-size: 20px; }
#start-btn:hover, #retry-btn:hover  { background: rgba(0, 200, 255, 0.20); }
#start-btn:active, #retry-btn:active { transform: translate(-50%, -50%) scale(0.94); }
@keyframes start-pulse {
  0%, 100% { box-shadow: 0 0 22px #00e8ff66, inset 0 0 10px #00e8ff33; }
  50%      { box-shadow: 0 0 38px #00e8ffaa, inset 0 0 18px #00e8ff66; }
}

/* ── Title (back-to-menu) button on GAME OVER ────────────────────────── */
#title-btn {
  position: absolute;
  left: 50%; top: 88%;
  transform: translate(-50%, -50%);
  padding: 9px 26px;
  border-radius: 999px;
  border: 1.5px solid rgba(180, 200, 220, 0.55);
  background: rgba(0, 0, 0, 0.45);
  color: rgba(210, 225, 240, 0.92);
  font: bold 13px/1 monospace;
  letter-spacing: 3px;
  cursor: pointer;
  z-index: 3;
  -webkit-user-select: none; user-select: none;
  pointer-events: auto;
  display: none;
  transition: background 0.15s, transform 0.1s, border-color 0.15s;
}
#title-btn:hover  { background: rgba(0, 0, 0, 0.65); border-color: rgba(220, 235, 250, 0.85); }
#title-btn:active { transform: translate(-50%, -50%) scale(0.94); }
#title-btn .kbd   { font-size: 9px; opacity: 0.6; margin-left: 6px; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="rotate-screen">
  <div class="rot-bracket tl"></div>
  <div class="rot-bracket tr"></div>
  <div class="rot-bracket bl"></div>
  <div class="rot-bracket br"></div>

  <div class="rot-chrome-top">
    <span class="rot-tag-mag">! ROTATE_REQUIRED</span>
  </div>

  <p class="rot-brand">HOVER DODGE</p>
  <p class="rot-tagline">壁と敵をよけ続けろ</p>

  <div class="rot-icon-wrap">
    <div class="rot-scope r1"></div>
    <div class="rot-scope r2"></div>
    <div class="rot-scope cross-h"></div>
    <div class="rot-scope cross-v"></div>
    <div class="rot-scope tick t-n"></div>
    <div class="rot-scope tick t-s"></div>
    <div class="rot-scope tick t-e"></div>
    <div class="rot-scope tick t-w"></div>
    <div class="rot-scope sweep"></div>
    <div class="rot-phone"></div>
    <span class="rot-arrow">↻</span>
  </div>
  <p class="rot-title" data-text="横向きにしてください">横向きにしてください</p>
  <p class="rot-sub">Please rotate your device</p>

  <div class="rot-bar-wrap"><div class="rot-bar-fill"></div></div>

  <p class="rot-stats-label">─── BEST RECORD ───</p>
  <p class="rot-stats-best" id="rot-best"><span class="nodata">— NO DATA —</span></p>
  <div class="rot-phase-timeline" id="rot-timeline">
    <div data-phase="1">PHASE 1<span class="sub">WALLS</span></div>
    <div data-phase="2">PHASE 2<span class="sub">BULLETS</span></div>
    <div data-phase="3">PHASE 3<span class="sub">SEEKERS</span></div>
    <div data-phase="4">PHASE 4<span class="sub">CHAOS</span></div>
  </div>

  <p class="rot-version">SYS_REV  1.0.10</p>
</div>
<div id="wrap"><canvas id="hud"></canvas><button id="start-btn" type="button">START</button><button id="retry-btn" type="button">RETRY</button><button id="title-btn" type="button">TITLE<span class="kbd">[ESC]</span></button><button id="pulse-btn" type="button"><span id="pulse-label">PULSE</span><span id="pulse-sub">[Z]</span></button></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

'use strict';
const VW = 800, VH = 450;

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
renderer.setSize(VW, VH);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.15;

const wrap = document.getElementById('wrap');
wrap.appendChild(renderer.domElement);
renderer.domElement.style.position = 'absolute';

const hudCanvas = document.getElementById('hud');
hudCanvas.width = VW; hudCanvas.height = VH;
hudCanvas.style.position = 'absolute';
const HX = hudCanvas.getContext('2d');

function resize() {
  const s = Math.min(innerWidth / VW, innerHeight / VH);
  const cssW = VW * s, cssH = VH * s;
  wrap.style.width  = cssW + 'px';
  wrap.style.height = cssH + 'px';
  for (const el of [renderer.domElement, hudCanvas]) {
    el.style.width  = cssW + 'px';
    el.style.height = cssH + 'px';
    el.style.left   = '0';

function buildShipGroup() {
  const g = new THREE.Group();

  // Hull — extruded bezier path (points to +X)
  const hull = new THREE.Shape();
  hull.moveTo(17, 0);
  hull.bezierCurveTo(14, 4, -1, 9, -9, 9);
  hull.lineTo(-9, 5.5);
  hull.bezierCurveTo(-6, 5, -3, 2, -5, 0);
  hull.bezierCurveTo(-3, -2, -6, -5, -9, -5.5);
  hull.lineTo(-9, -9);
  hull.bezierCurveTo(-1, -9, 14, -4, 17, 0);

  const hullMesh = new THREE.Mesh(
    new THREE.ExtrudeGeometry(hull, { depth: 5, bevelEnabled: true, bevelSize: 0.7, bevelThickness: 0.7, bevelSegments: 2 }),
    new THREE.MeshPhongMaterial({ color: 0x00d8ff, emissive: 0x006688, shininess: 140, specular: 0xaaeeff })
  );
  hullMesh.position.z = -2.5; // center hull depth around z=0
  g.add(hullMesh);

  // Wings (y negated from canvas coords for Three.js y-up)
  for (const pts of [
    [[2,5],[-9,16],[-13,8],[-9,9]],    // top wing
    [[2,-5],[-9,-16],[-13,-8],[-9,-9]] // bottom wing
  ]) {
    const ws = new THREE.Shape();
    ws.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ws.lineTo(pts[i][0], pts[i][1]);
    ws.closePath();
    const wm = new THREE.Mesh(
      new THREE.ExtrudeGeometry(ws, { depth: 2.5, bevelEnabled: false }),
      new THREE.MeshPhongMaterial({ color: 0x33b8e0, emissive: 0x003a55, shininess: 50 })
    );
    wm.position.z = -1.25;
    g.add(wm);
  }

  // Cockpit dome
  const ck = new THREE.Mesh(
    new THREE.SphereGeometry(5, 20, 14),
    new THREE.MeshPhongMaterial({ color: 0xc0eaff, emissive: 0x002233, shininess: 220, specular: 0xffffff, transparent: true, opacity: 0.88 })
  );
  ck.position.set(5, 0, 5); ck.scale.set(1.45, 0.85, 0.72);
  g.add(ck);

  // Engine nozzle glow sphere (emissive → bloomed)
  const eng = new THREE.Mesh(
    new THREE.SphereGeometry(4, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0x44aaff })
  );
  eng.position.set(-16, 0, 2.5); eng.name = 'engine';
  g.add(eng);

  // Flame cone — rotation.z=π/2 so tip points to -X (trailing behind ship)
  const flameMesh = new THREE.Mesh(
    new THREE.ConeGeometry(3, 16, 8),
    new THREE.MeshBasicMaterial({ color: 0x55ccff, transparent: true, opacity: 0.75, side: THREE.DoubleSide })
  );
  flameMesh.rotation.z = Math.PI / 2;
  flameMesh.position.set(-16, 0, 2.5); flameMesh.name = 'flame';
  g.add(flameMesh);

  g.scale.setScalar(0.85);
  return g;
}

// ── Audio (WebAudio synth) ────────────────────────────────────────────────────
let audioCtx = null;
let audioMuted = +localStorage.getItem('hd_mute') === 1;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type='triangle', vol=0.18, freq2=null) {
  if (audioMuted) return;
  const a = getAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, a.currentTime);
  if (freq2 != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq2), a.currentTime + dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + dur);
}
function noiseBurst(dur, vol=0.25, filterFreq=1200, sweep=null) {
  if (audioMuted) return;
  const a = getAudio(); if (!a) return;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random()*2-1;
  const src = a.createBufferSource(); src.buffer = buf;
  const filt = a.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.setValueAtTime(filterFreq, a.currentTime);
  if (sweep != null) filt.frequency.exponentialRampToValueAtTime(Math.max(60, sweep), a.currentTime+dur);
  const g = a.createGain();
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  src.connect(filt).connect(g).connect(a.destination);
  src.start(); src.stop(a.currentTime+dur);
}
const sfxFlap   = () => tone(380, 0.08, 'triangle', 0.14, 560);
const sfxPulse  = () => { noiseBurst(0.18, 0.22, 1800, 200); tone(140, 0.18, 'sawtooth', 0.10, 60); };
const sfxHit    = () => { noiseBurst(0.45, 0.32, 1400, 80); tone(220, 0.45, 'square', 0.18, 55); };
const sfxScore  = () => tone(880, 0.06, 'sine', 0.12);
const sfxBonus  = () => tone(1320, 0.05, 'sine', 0.10);

function vibrate(pattern) {

// ── Phases / difficulty ───────────────────────────────────────────────────────
const PHASE_CONFIG = [
  { gapMin:170, gapBase:230, spawnBase:99999, seekerProb:0.00, spdCap:4.0, name:'PHASE 1' }, // 0-20s walls only
  { gapMin:140, gapBase:200, spawnBase:170,   seekerProb:0.00, spdCap:5.5, name:'PHASE 2' }, // 20-50s + bullets

function addWall(startX) {

  const gapY = margin + Math.random() * (VH - margin*2 - gap);

}
function addEnemy() {
  const cfg = PHASE_CONFIG[curPhase];
  const seeker = Math.random() < cfg.seekerProb;
  const y = 45 + Math.random() * (VH - 90);
  if (seeker) {
    enemies.push({
      x: VW+15, y, vx: -(spd+0.5), vy: 0, r: 5, type: 's',
      pulse: 0, facing: Math.PI, spin: 0,
      life: 540,                    // ~9s lifespan to prevent infinite stalking
    });
  } else {
    enemies.push({
      x: VW+15, y, vx: -(spd+2.5+Math.random()*2), vy: (Math.random()-.5)*2.5,
      r: 5, type: 'b', spin: 0, life: 600,
    });

}

function pushBonus(x, y, text, color) {
  bonusPopups.push({ x, y, text, color, life: 1 });
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function clearWorld() {
  for (const w of walls) removeWallMesh(w);
  for (const e of enemies) removeEnemyMesh(e);
  for (const sm of sparkMeshPool) scene.remove(sm);
  sparkMeshPool.length = 0;
  walls = []; enemies = []; sparks = [];
  for (const pr of pulseRings) {
    scene.remove(pr.mesh);  pr.mesh.geometry.dispose();  pr.mesh.material.dispose();
    scene.remove(pr.mesh2); pr.mesh2.geometry.dispose(); pr.mesh2.material.dispose();
  }
  pulseRings = []; pulseCooldown = 0;
  shakeX = 0; shakeY = 0;
}

function startGame() {
  gstate = 'play'; score = frame = 0; spd = 3;
  P.x = 150; P.y = VH/2; P.vx = P.vy = 0; P.bankAngle = 0; P.inv = 90;
  enemySpawnTimer = 120;   // grace period before first enemy
  curPhase = 0; lastPhase = -1; phaseFlash = 0;
  killCount = 0; nearMissCount = 0;
  nopulseStreak = 0; lastMilestone = 0; pulseUsedThisRun = false;
  bonusPopups = [];
  clearWorld();
  for (let i = 0; i < 4; i++) addWall(VW + i*265);
  getAudio();   // user-gesture audio unlock
}

function gotoMenu() {
  clearWorld();
  bonusPopups = [];

}

function die() {
  gstate = 'dead';
  deadCooldown = 30;
  sfxHit();
  vibrate([60, 40, 90]);
  const s = Math.floor(score);
  if (s > hiScore) { hiScore = s; localStorage.setItem('hd_hi', s); }
  shakeX = 12; shakeY = 9;
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*Math.PI*2, v = Math.random()*8+1;
    const sp = {
      x: P.x, y: P.y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      life: 1, sz: 1+Math.random()*4,

      new THREE.SphereGeometry(sp.sz * 0.8, 5, 5),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${sp.hue},100%,75%)`), transparent: true })
    );
    sm.userData.sp = sp;
    scene.add(sm);
    sparkMeshPool.push(sm);
  }
}


// ── Update (game logic) ───────────────────────────────────────────────────────
function update(dt) {
  tick += dt;
  // Exponential decay approximated linearly for small dt
  const decay = Math.min(1, 0.30 * dt);
  shakeX *= (1 - decay); shakeY *= (1 - decay);
  if (Math.abs(shakeX) < 0.05) shakeX = 0;
  if (Math.abs(shakeY) < 0.05) shakeY = 0;

  if (deadCooldown > 0) deadCooldown -= dt;

  // Stars scroll
  const ws = gstate === 'play' ? spd : 2;
  for (let i = 0; i < STAR_N; i++) {
    starPos[i*3] -= starSpd[i] * (ws / 3) * 0.45 * dt;
    if (starPos[i*3] < -VW/2) { starPos[i*3] = VW/2; starPos[i*3+1] = (Math.random()-0.5)*VH; }
  }
  starGeom.attributes.position.needsUpdate = true;

  // Speed lines
  const tsl = Math.max(0, (spd - 4.0) / 6.0);
  slMat.opacity = tsl * 0.45;
  for (let i = 0; i < SL_N; i++) {
    const sl = slData[i];
    sl.x -= sl.spd * (ws / 3) * dt;
    if (sl.x + sl.len < 0) { sl.x = VW + sl.len; sl.y = Math.random() * VH; }
    const p1 = W(sl.x, sl.y, -8), p2 = W(sl.x + sl.len * Math.min(1, tsl*1.5), sl.y, -8);
    slPos.set([p1.x,p1.y,p1.z, p2.x,p2.y,p2.z], i*6);
  }
  slGeom.attributes.position.needsUpdate = true;

  // Grid offset
  const gOff = (gstate === 'play' ? frame*spd*0.32 : tick*0.55) % 80;
  gridMesh.position.x = -gOff;

  // Pulse cooldown + button visual (always)
  if (pulseCooldown > 0) pulseCooldown -= dt;
  if (pulseCooldown <= 0) {
    pulseCooldown = 0;
    pulseBtn.classList.add('ready');
    pulseLabel.textContent = 'PULSE'; pulseSub.textContent = '[Z]';
  } else {
    pulseBtn.classList.remove('ready');
    pulseLabel.textContent = Math.ceil(pulseCooldown/60) + 's'; pulseSub.textContent = '';
  }

  // Bonus popups (decay regardless of state for visual continuity)
  for (const bp of bonusPopups) bp.life -= 0.018 * dt;
  bonusPopups = bonusPopups.filter(bp => bp.life > 0);
  if (phaseFlash > 0) phaseFlash -= dt;

  if (gstate !== 'play') return;
  frame += dt;
  score += dt / 60;

  // Phase progression
  curPhase = getPhase(score);
  if (curPhase !== lastPhase) {
    if (lastPhase >= 0) { phaseFlash = 90; sfxBonus(); }
    lastPhase = curPhase;
  }
  const cfg = PHASE_CONFIG[curPhase];
  spd = Math.min(cfg.spdCap, 3 + Math.sqrt(score) * 0.35);

  // Score milestone beeps every 10s
  if (Math.floor(score / 10) > lastMilestone) {
    lastMilestone = Math.floor(score / 10);
    sfxScore();
  }

  // No-pulse streak counter
  nopulseStreak += dt / 60;

  // Player — gravity + flap impulse (Flappy-Bird style)
  P.vy += GRAVITY * dt;
  if (P.vy > 14) P.vy = 14;
  P.y = Math.max(P.r, Math.min(VH - P.r, P.y + P.vy * dt));

  const bankTarget = Math.max(-0.40, Math.min(0.40, P.vy * 0.052));
  P.bankAngle += (bankTarget - P.bankAngle) * Math.min(0.5, 0.10 * dt);

  // Walls
  const spacing = Math.max(190, 265 - score*0.4);
  if (!walls.length || walls[walls.length-1].x < VW-spacing) addWall();
  for (const w of walls) {
    w.x -= spd * dt;
    w.pulse += 0.042 * dt;
    // Near-miss detection: when wall trailing edge crosses player x
    if (!w.passed && w.x + w.w < P.x) {
      w.passed = true;
      const cy = w.gapY + w.gap / 2;
      const distFromCenter = Math.abs(P.y - cy);
      const halfGap = w.gap / 2;
      const margin = halfGap - distFromCenter; // distance from nearest edge
      if (margin < halfGap * 0.30) {
        // Tight pass! +bonus
        const bonus = margin < halfGap * 0.15 ? 25 : 10;
        score += bonus / 60;  // convert "score points" to seconds (~minor add)
        nearMissCount++;
        pushBonus(P.x, P.y - 22, `+${bonus} NEAR!`, '#ffee44');
        sfxBonus();
        vibrate(8);
      }
    }
  }
  walls = walls.filter(w => {
    if (w.x + w.w <= -10) { removeWallMesh(w); return false; }
    return true;
  });

  // Enemies — timer-based spawn (dt-stable). Phase 0 (walls-only) keeps
  // the timer parked at a small value so the first enemy lands shortly
  // after entering phase 1, instead of inheriting a giant phase-0 interval.
  if (cfg.spawnBase < 9999) {
    const eInterval = Math.max(60, cfg.spawnBase - score*0.6);
    enemySpawnTimer -= dt;
    if (enemySpawnTimer <= 0) {
      addEnemy();
      enemySpawnTimer = eInterval;
    }
  } else {
    enemySpawnTimer = 60;
  }
  for (const e of enemies) {
    e.spin += (e.type === 'b' ? 0.17 : 0.05) * dt;
    if (e.life != null) e.life -= dt;
    if (e.type === 's') {
      const dx = P.x-e.x, dy = P.y-e.y;
      const tf = Math.atan2(dy, dx);
      let df = tf - e.facing;
      while (df >  Math.PI) df -= Math.PI*2;
      while (df < -Math.PI) df += Math.PI*2;
      // Capped turn rate — sharp player movement can shake the seeker off
      const turnRate = 0.045;
      e.facing += Math.max(-turnRate, Math.min(turnRate, df * 0.5)) * dt;
      // Velocity clamped below player flap potential
      const seekerSpd = Math.min(spd * 0.85 + 0.4, 4.5);
      e.vx = Math.cos(e.facing) * seekerSpd;
      e.vy = Math.sin(e.facing) * seekerSpd;
      e.pulse += 0.08 * dt;
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
  }
  enemies = enemies.filter(e => {
    if (e.x<-60 || e.x>VW+70 || e.y<-60 || e.y>VH+60) { removeEnemyMesh(e); return false; }
    if (e.life != null && e.life <= 0)               { removeEnemyMesh(e); return false; }
    return true;
  });

  // Pulse rings — 輪が掃過した敵を撃破
  for (const pr of pulseRings) {
    pr.prevR = pr.r;
    const ringStep = ((PULSE_MAX_R - pr.r) * 0.10 + 2) * dt;
    pr.r += ringStep;
    enemies = enemies.filter(e => {
      const dist = Math.hypot(pr.x - e.x, pr.y - e.y);
      if (dist > pr.r + e.r || dist < pr.prevR - e.r) return true;
      for (let i = 0; i < 12; i++) {
        const a = Math.random()*Math.PI*2, v = 2+Math.random()*5;
        const sp = { x:e.x, y:e.y, vx:Math.cos(a)*v, vy:Math.sin(a)*v,
          life:1, sz:0.8+Math.random()*3, hue:e.type==='b' ? 20 : 35 };
        sparks.push(sp);
        const sm = new THREE.Mesh(new THREE.SphereGeometry(sp.sz*0.8,4,4),
          new THREE.MeshBasicMaterial({ color:new THREE.Color(`hsl(${sp.hue},100%,70%)`), transparent:true }));
        sm.userData.sp = sp; scene.add(sm); sparkMeshPool.push(sm);
      }
      // Kill bonus
      killCount++;
      const kb = e.type === 'b' ? 15 : 20;
      score += kb / 60;
      pushBonus(e.x, e.y, `+${kb}`, e.type === 'b' ? '#ff8844' : '#ffaa55');
      removeEnemyMesh(e);
      return false;
    });
  }
  pulseRings = pulseRings.filter(pr => {
    if (pr.r >= PULSE_MAX_R) {
      scene.remove(pr.mesh);  pr.mesh.geometry.dispose();  pr.mesh.material.dispose();
      scene.remove(pr.mesh2); pr.mesh2.geometry.dispose(); pr.mesh2.material.dispose();
      return false;
    }
    return true;
  });

  if (P.inv > 0) { P.inv -= dt; return; }
  for (const w of walls)
    if (P.x+P.r>w.x && P.x-P.r<w.x+w.w)
      if (P.y-P.r<w.gapY || P.y+P.r>w.gapY+w.gap) { die(); return; }
  for (const e of enemies) {
    const dx = P.x-e.x, dy = P.y-e.y, rr = P.r+e.r;
    if (dx*dx + dy*dy < rr*rr) { die(); return; }
  }
}

// ── Scene sync (game state → Three.js objects) ────────────────────────────────
function syncScene() {
  const hover = Math.sin(tick * 0.067) * 1.7;
  const sk = new THREE.Vector3(shakeX*(Math.random()*2-1), -shakeY*(Math.random()*2-1), 0);

  // Ship
  const flame = shipGroup.getObjectByName('flame');
  const engine = shipGroup.getObjectByName('engine');
  const fl = 10 + Math.abs(Math.sin(tick*0.52))*7 + Math.hypot(P.vx,P.vy)*0.42;
  if (flame) { flame.scale.y = fl / 16; flame.position.x = -16 - fl / 2; }
  if (engine) engine.scale.setScalar(0.7 + Math.abs(Math.sin(tick*0.44))*0.5);

  if (gstate === 'menu') {
    shipGroup.visible = true;
    const mx = VW/2 + Math.sin(tick*0.022)*16;
    const my = VH/2 + 115 + Math.sin(tick*0.04)*8;
    shipGroup.position.copy(W(mx, my, 0));
    shipGroup.rotation.z = Math.sin(tick * 0.04) * 0.08;
    shipLight.position.copy(W(mx, my, 25));
    shipLight.intensity = 5 + Math.sin(tick * 0.065) * 3.5;  // 呼吸グロー
  } else {
    shipGroup.visible = true;
    shipGroup.position.copy(W(P.x, P.y + hover, 0)).add(sk);
    shipGroup.rotation.z = -P.bankAngle;
    shipLight.position.copy(W(P.x, P.y, 25));
    shipLight.intensity = 4;
  }

  // Walls
  for (const w of walls) {
    const rec = getOrCreateWall(w);
    const cx = w.x + w.w / 2;
    const topH = Math.max(0.01, w.gapY);
    const botH = Math.max(0.01, VH - w.gapY - w.gap);
    const p = 0.68 + Math.sin(w.pulse) * 0.32;

    rec.topM.scale.y = topH;
    rec.topM.position.copy(W(cx, topH / 2, 0));
    rec.botM.scale.y = botH;
    rec.botM.position.copy(W(cx, w.gapY + w.gap + botH / 2, 0));

    rec.edgeT.position.copy(W(cx, w.gapY, 2));
    rec.edgeT.material.color.setRGB(Math.min(1, p * 1.0), Math.min(1, p * 0.55), Math.min(1, p * 1.0));
    rec.edgeB.position.copy(W(cx, w.gapY + w.gap, 2));
    rec.edgeB.material.color.setRGB(Math.min(1, p * 1.0), Math.min(1, p * 0.55), Math.min(1, p * 1.0));
  }

  // Enemies
  for (const e of enemies) {
    const grp = getOrCreateEnemy(e);
    grp.position.copy(W(e.x, e.y, 0)).add(sk);
    if (e.type === 'b') {
      const r1 = grp.getObjectByName('r1');
      const r2 = grp.getObjectByName('r2');
      if (r1) r1.rotation.z = e.spin;
      if (r2) r2.rotation.y = e.spin * 1.3;
    } else {
      // facing is canvas-angle (y down), convert to world rotation (y up)
      grp.rotation.z = -e.facing;
    }
  }

  // Pulse rings
  for (const pr of pulseRings) {
    const alpha = 1 - pr.r / PULSE_MAX_R;
    pr.mesh.scale.set(pr.r, pr.r, 1);
    pr.mesh.position.copy(W(P.x, P.y, 8));
    pr.mesh.material.opacity = alpha;
    pr.mesh2.scale.set(pr.r * 0.80, pr.r * 0.80, 1);
    pr.mesh2.position.copy(W(P.x, P.y, 6));
    pr.mesh2.material.opacity = alpha * 0.6;
  }

  // Sparks
  for (let i = sparkMeshPool.length - 1; i >= 0; i--) {
    const sm = sparkMeshPool[i];
    const sp = sm.userData.sp;
    if (sp.life <= 0) { scene.remove(sm); sm.geometry.dispose(); sm.material.dispose(); sparkMeshPool.splice(i, 1); }
    else { sm.position.copy(W(sp.x, sp.y, 5)).add(sk); sm.material.opacity = Math.pow(sp.life, 1.3); }
  }
  // Advance sparks (dt-stable)
  const fric = Math.min(1, 0.08 * dtScale);
  for (const sp of sparks) {
    sp.x += sp.vx * dtScale; sp.y += sp.vy * dtScale;
    sp.vx *= (1 - fric);     sp.vy *= (1 - fric);
    sp.life -= 0.014 * dtScale;
  }
  sparks = sparks.filter(s => s.life > 0);

  // Camera shake
  camera.position.x = shakeX * (Math.random()*2-1) * 0.4;
  camera.position.y = -shakeY * (Math.random()*2-1) * 0.4;
}

// ── HUD (2D canvas overlay) ───────────────────────────────────────────────────
let lastStartBtnVisible = null;
let lastRetryBtnVisible = null;
let lastTitleBtnVisible = null;
function syncOverlayBtns() {
  const wantStart = (gstate === 'menu');
  if (wantStart !== lastStartBtnVisible) {
    startBtn.style.display = wantStart ? 'inline-block' : 'none';
    lastStartBtnVisible = wantStart;
  }
  const wantDead = (gstate === 'dead' && deadCooldown <= 0);
  if (wantDead !== lastRetryBtnVisible) {
    retryBtn.style.display = wantDead ? 'inline-block' : 'none';
    lastRetryBtnVisible = wantDead;
  }
  if (wantDead !== lastTitleBtnVisible) {
    titleBtn.style.display = wantDead ? 'inline-block' : 'none';
    lastTitleBtnVisible = wantDead;
  }
}
function drawHUD() {
  HX.clearRect(0, 0, VW, VH);
  syncOverlayBtns();

  if (gstate === 'menu') {
    HX.textAlign = 'center';
    HX.shadowColor='#00ffff'; HX.shadowBlur=52; HX.fillStyle='#00ffff';
    HX.font='bold 62px monospace'; HX.fillText('HOVER DODGE', VW/2, VH/2-78);
    HX.shadowColor='#8899ff'; HX.shadowBlur=14; HX.fillStyle='#99aaff';
    HX.font='21px monospace'; HX.fillText('壁と敵をよけ続けろ！', VW/2, VH/2-26);
    HX.shadowBlur=0; HX.fillStyle='rgba(145,165,205,0.58)';
    HX.font='13px monospace'; HX.fillText('タップ / SPACE で浮上 ・ Z でパルス', VW/2, VH/2+4);
    if (hiScore > 0) {
      HX.shadowColor='#ffdd44'; HX.shadowBlur=10; HX.fillStyle='#ffcc44';
      HX.font='bold 13px monospace'; HX.fillText('★ BEST RECORD ★', VW/2, VH/2+108);
      HX.shadowColor='#ffee66'; HX.shadowBlur=18; HX.fillStyle='#ffee88';
      HX.font='bold 30px monospace'; HX.fillText(`${hiScore}`, VW/2-14, VH/2+142);
      HX.shadowBlur=10; HX.fillStyle='#ffd066';
      HX.font='bold 16px monospace'; HX.fillText('秒', VW/2+22, VH/2+142);
      HX.shadowBlur=0;
    }
    HX.textAlign='left';
    return;
  }

  HX.textAlign='left';
  HX.shadowColor='#00e8ff'; HX.shadowBlur=14; HX.fillStyle='#00e8ff';
  HX.font='bold 22px monospace'; HX.fillText(`SCORE  ${Math.floor(score)}`, 18, 34);
  HX.shadowColor='#ffdd44'; HX.shadowBlur=8; HX.fillStyle='#ffdd44';
  HX.font='bold 16px monospace'; HX.fillText(`BEST   ${hiScore}`, 18, 56);
  const bw=110, bf=Math.max(0,(spd-3)/7)*bw;
  HX.shadowBlur=0; HX.fillStyle='rgba(255,255,255,0.06)'; HX.fillRect(18,64,bw,5);
  const hu=210-(spd-3)/7*140;
  HX.shadowColor=`hsl(${hu},100%,60%)`; HX.shadowBlur=7;
  HX.fillStyle=`hsl(${hu},100%,62%)`; HX.fillRect(18,64,bf,5);
  HX.shadowBlur=0; HX.fillStyle=`hsla(${hu},70%,75%,0.65)`;
  HX.font='10px monospace'; HX.fillText('SPD', 18+bw+5, 70);

  // Stats line: kills / near-miss / no-pulse streak
  HX.shadowBlur=0; HX.font='11px monospace';
  HX.fillStyle='rgba(180,210,240,0.55)';
  HX.fillText(`KILL ${killCount}   NEAR ${nearMissCount}`, 18, 86);
  if (!pulseUsedThisRun && nopulseStreak > 5) {
    HX.fillStyle='rgba(180,255,200,0.75)';
    HX.fillText(`PURIST  ${nopulseStreak.toFixed(1)}s`, 18, 100);
  }

  // Top-right: phase indicator
  HX.textAlign='right';
  HX.fillStyle='rgba(180,210,240,0.45)';
  HX.font='11px monospace';
  HX.fillText(PHASE_CONFIG[curPhase].name, VW - 18, 22);

  // Phase transition banner
  if (phaseFlash > 0) {
    HX.textAlign='center';
    const a = Math.min(1, phaseFlash / 90);
    HX.globalAlpha = a;
    HX.shadowColor='#00e8ff'; HX.shadowBlur=22; HX.fillStyle='#00e8ff';
    HX.font='bold 30px monospace';
    HX.fillText(PHASE_CONFIG[curPhase].name, VW/2, 70);
    HX.globalAlpha = 1; HX.shadowBlur=0;
  }

  // Bonus popups
  HX.textAlign='center';
  for (const bp of bonusPopups) {
    HX.globalAlpha = Math.min(1, bp.life * 1.4);
    HX.shadowColor = bp.color; HX.shadowBlur = 8;
    HX.fillStyle = bp.color;
    HX.font = 'bold 14px monospace';
    HX.fillText(bp.text, bp.x, bp.y - (1 - bp.life) * 28);
  }
  HX.globalAlpha = 1; HX.shadowBlur = 0;

  // Audio mute indicator (bottom-left, subtle)
  if (audioMuted) {
    HX.textAlign='left';
    HX.fillStyle='rgba(200,200,200,0.35)';
    HX.font='10px monospace';
    HX.fillText('[M] MUTED', 18, VH-12);
  }

  if (gstate === 'dead') {
    HX.fillStyle='rgba(0,0,14,0.62)'; HX.fillRect(0,0,VW,VH);
    HX.textAlign='center';
    HX.shadowColor='#ff2222'; HX.shadowBlur=52; HX.fillStyle='#ff5555';
    HX.font='bold 58px monospace'; HX.fillText('GAME OVER', VW/2, VH/2-62);
    HX.shadowBlur=0; HX.fillStyle='rgba(160,185,215,0.68)';
    HX.font='17px monospace'; HX.fillText('スコア', VW/2, VH/2-22);
    HX.shadowColor='#ffffff'; HX.shadowBlur=14; HX.fillStyle='#ffffff';
    HX.font='bold 32px monospace'; HX.fillText(`${Math.floor(score)} 秒`, VW/2, VH/2+12);

    // Run summary
    HX.shadowBlur=0; HX.fillStyle='rgba(180,210,240,0.6)';
    HX.font='12px monospace';
    HX.fillText(`KILLS ${killCount}   NEAR-MISS ${nearMissCount}`, VW/2, VH/2+34);

    if (Math.floor(score) >= hiScore && hiScore > 0) {
      const rp = 0.7 + Math.sin(tick*0.1)*0.3;
      HX.globalAlpha=rp; HX.shadowColor='#ffee44'; HX.shadowBlur=24; HX.fillStyle='#ffee55';
      HX.font='bold 22px monospace'; HX.fillText('★  NEW RECORD  ★', VW/2, VH/2+64);
      HX.globalAlpha=1;
    }
    HX.globalAlpha=1; HX.shadowBlur=0; HX.textAlign='left';
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
const FRAME_MS = 1000 / 60;
let lastTime = 0;
function loop(now) {
  if (!lastTime) lastTime = now;
  // Cap dtScale to prevent huge jumps when tab returns from background.
  dtScale = Math.min(3, Math.max(0.05, (now - lastTime) / FRAME_MS));
  lastTime = now;
  update(dtScale);
  syncScene();
  composer.render();
  drawHUD();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script>
// Rotate-screen: show the player's best record + best phase reached.
// Reads localStorage and refreshes when the orientation changes back to portrait
// (so a fresh high score from a landscape session shows up immediately).
(function () {
  const bestEl = document.getElementById('rot-best');
  const tl = document.getElementById('rot-timeline');
  if (!bestEl || !tl) return;

  function bestPhase(hi) {
    if (hi >= 100) return 4;
    if (hi >=  50) return 3;
    if (hi >=  20) return 2;
    if (hi >    0) return 1;
    return 0;
  }
  function refresh() {
    const hi = +localStorage.getItem('hd_hi') || 0;
    if (hi > 0) {
      bestEl.innerHTML = `${hi}<span class="unit">SEC</span>`;
    } else {
      bestEl.innerHTML = '<span class="nodata">— NO DATA —</span>';
    }
    const bp = bestPhase(hi);
    [...tl.children].forEach((c, i) => {
      const p = i + 1;
      c.classList.toggle('reached', p <= bp);
      c.classList.toggle('current', p === bp);
    });
  }
  refresh();
  // Refresh whenever we (re)enter portrait orientation.
  const mq = matchMedia('(orientation: portrait)');
  if (mq.addEventListener) mq.addEventListener('change', refresh);
  else if (mq.addListener) mq.addListener(refresh);
})();
</script>

}
