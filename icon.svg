<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="50%" cy="46%" r="62%">
      <stop offset="0%"   stop-color="#102050"/>
      <stop offset="45%"  stop-color="#040a26"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>

    <!-- Hull (vivid cyan) -->
    <linearGradient id="hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#eaffff"/>
      <stop offset="30%"  stop-color="#33ddff"/>
      <stop offset="80%"  stop-color="#0077aa"/>
      <stop offset="100%" stop-color="#003355"/>
    </linearGradient>

    <!-- Wings -->
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#88e8ff"/>
      <stop offset="60%"  stop-color="#33b8e0"/>
      <stop offset="100%" stop-color="#003a55"/>
    </linearGradient>

    <!-- Cockpit dome -->
    <radialGradient id="cockpit" cx="32%" cy="32%" r="85%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#aaeeff"/>
      <stop offset="100%" stop-color="#3399cc"/>
    </radialGradient>

    <!-- Engine flame -->
    <radialGradient id="flame" cx="80%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#aaeeff"/>
      <stop offset="60%"  stop-color="#33aaff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0"/>
    </radialGradient>

    <!-- Magenta wall gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd0ff"/>
      <stop offset="50%"  stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#ffd0ff"/>
    </linearGradient>

    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="magentaGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Radar rings -->
  <g fill="none" stroke="#00e8ff" stroke-width="1.4">
    <circle cx="256" cy="256" r="92"  stroke-opacity="0.13"/>
    <circle cx="256" cy="256" r="142" stroke-opacity="0.09"/>
    <circle cx="256" cy="256" r="198" stroke-opacity="0.06"/>
  </g>

  <!-- Stars -->
  <g fill="#bcd6ff">
    <circle cx="82"  cy="96"  r="2.6" opacity="0.9"/>
    <circle cx="432" cy="72"  r="3.2"/>
    <circle cx="106" cy="425" r="2.1" opacity="0.75"/>
    <circle cx="450" cy="378" r="2.5" opacity="0.85"/>
    <circle cx="392" cy="138" r="1.7" opacity="0.6"/>
    <circle cx="138" cy="298" r="1.7" opacity="0.6"/>
    <circle cx="478" cy="248" r="2.0" opacity="0.7"/>
    <circle cx="42"  cy="200" r="1.4" opacity="0.5"/>
    <circle cx="350" cy="455" r="1.8" opacity="0.55"/>
  </g>

  <!-- Neon magenta wall accents (frame the ship) -->
  <g filter="url(#magentaGlow)" opacity="0.85">
    <rect x="38"  y="108" width="18" height="98" fill="#ff2bd6" rx="5"/>
    <rect x="38"  y="306" width="18" height="98" fill="#ff2bd6" rx="5"/>
    <rect x="456" y="146" width="18" height="98" fill="#ff2bd6" rx="5"/>
    <rect x="456" y="268" width="18" height="98" fill="#ff2bd6" rx="5"/>
  </g>
  <g>
    <rect x="38"  y="108" width="18" height="98" fill="url(#wallGrad)" rx="5"/>
    <rect x="38"  y="306" width="18" height="98" fill="url(#wallGrad)" rx="5"/>
    <rect x="456" y="146" width="18" height="98" fill="url(#wallGrad)" rx="5"/>
    <rect x="456" y="268" width="18" height="98" fill="url(#wallGrad)" rx="5"/>
  </g>

  <!-- Cyan halo behind ship -->
  <g filter="url(#bloom)">
    <circle cx="256" cy="256" r="115" fill="#00e8ff" opacity="0.22"/>
    <circle cx="256" cy="256" r="62"  fill="#aaffff" opacity="0.32"/>
  </g>

  <!-- Engine flame trail -->
  <ellipse cx="170" cy="256" rx="86" ry="22" fill="url(#flame)"/>

  <!-- Ship (centered, facing right) -->
  <g transform="translate(256 256)">
    <!-- Wings -->
    <g filter="url(#cyanGlow)">
      <path d="M-22,-32 L-92,-96 L-110,-52 L-32,-30 Z"
            fill="url(#wing)" stroke="#88e8ff" stroke-width="2"/>
      <path d="M-22,32  L-92,96  L-110,52  L-32,30  Z"
            fill="url(#wing)" stroke="#88e8ff" stroke-width="2"/>
    </g>

    <!-- Hull -->
    <path d="M110,0
             C94,-46 32,-74 -32,-74
             L-32,-30
             C6,-22 22,-4 18,0
             C22,4 6,22 -32,30
             L-32,74
             C32,74 94,46 110,0 Z"
          fill="url(#hull)" stroke="#aaf6ff" stroke-width="3.5"/>

    <!-- Top edge highlight -->
    <path d="M38,-50 C72,-40 92,-22 102,-2"
          fill="none" stroke="#ffffff" stroke-width="2.5"
          stroke-linecap="round" opacity="0.55"/>

    <!-- Cockpit dome -->
    <ellipse cx="42" cy="-7" rx="34" ry="22"
             fill="url(#cockpit)" stroke="#ffffff" stroke-width="1.5" opacity="0.95"/>
    <ellipse cx="50" cy="-13" rx="13" ry="7" fill="white" opacity="0.75"/>

    <!-- Engine nozzle -->
    <circle cx="-28" cy="0" r="22" fill="#66ddff" filter="url(#cyanGlow)"/>
    <circle cx="-28" cy="0" r="13" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
