<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deeper space background: cyan core fading to true black at edges -->
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#152a66"/>
      <stop offset="30%"  stop-color="#06122e"/>
      <stop offset="65%"  stop-color="#02060f"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>

    <!-- Hull: chrome-like vivid cyan with bright top highlight -->
    <linearGradient id="hull" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#66f0ff"/>
      <stop offset="55%"  stop-color="#22c4ff"/>
      <stop offset="85%"  stop-color="#0066aa"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>

    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#aaeeff"/>
      <stop offset="50%"  stop-color="#33b8e0"/>
      <stop offset="100%" stop-color="#003a55"/>
    </linearGradient>

    <radialGradient id="cockpit" cx="32%" cy="32%" r="80%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#bbeeff"/>
      <stop offset="100%" stop-color="#3399cc"/>
    </radialGradient>

    <!-- Engine flame: bright white core fading to deep cyan -->
    <radialGradient id="flame" cx="85%" cy="50%" r="62%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="22%"  stop-color="#aaf2ff" stop-opacity="0.9"/>
      <stop offset="55%"  stop-color="#33bbff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd0ff"/>
      <stop offset="50%"  stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#ffd0ff"/>
    </linearGradient>

    <!-- Pulse ring with cyan→purple chromatic gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#aa44ff" stop-opacity="0.2"/>
      <stop offset="45%"  stop-color="#00e8ff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#00e8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#aa44ff" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="magentaGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="pulseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Faint perspective grid (depth cue) -->
  <g stroke="#1a66cc" stroke-width="1.4" fill="none" opacity="0.16">
    <line x1="0" y1="380" x2="512" y2="320"/>
    <line x1="0" y1="432" x2="512" y2="370"/>
    <line x1="0" y1="132" x2="512" y2="192"/>
    <line x1="0" y1="80"  x2="512" y2="142"/>
  </g>

  <!-- Stars (varied size + opacity for depth) -->
  <g fill="#cce0ff">
    <circle cx="88"  cy="92"  r="2.8" opacity="0.9"/>
    <circle cx="416" cy="86"  r="3.2"/>
    <circle cx="102" cy="430" r="2.2" opacity="0.75"/>
    <circle cx="442" cy="380" r="2.6" opacity="0.85"/>
    <circle cx="372" cy="142" r="1.8" opacity="0.6"/>
    <circle cx="142" cy="302" r="1.8" opacity="0.6"/>
    <circle cx="470" cy="252" r="2.0" opacity="0.7"/>
    <circle cx="58"  cy="208" r="1.5" opacity="0.5"/>
    <circle cx="346" cy="458" r="1.9" opacity="0.55"/>
    <circle cx="226" cy="64"  r="1.4" opacity="0.5"/>
    <circle cx="294" cy="448" r="1.6" opacity="0.55"/>
    <circle cx="170" cy="146" r="1.3" opacity="0.45"/>
  </g>

  <!-- Diagonal speed lines (motion blur trail from left) -->
  <g stroke="#aaeeff" stroke-linecap="round">
    <line x1="40"  y1="192" x2="170" y2="240" stroke-width="2.4" opacity="0.65"/>
    <line x1="70"  y1="158" x2="200" y2="220" stroke-width="1.6" opacity="0.42"/>
    <line x1="22"  y1="252" x2="178" y2="266" stroke-width="2.8" opacity="0.7"/>
    <line x1="42"  y1="304" x2="172" y2="282" stroke-width="2.4" opacity="0.65"/>
    <line x1="86"  y1="362" x2="208" y2="312" stroke-width="1.6" opacity="0.42"/>
    <line x1="56"  y1="120" x2="186" y2="200" stroke-width="1.2" opacity="0.30"/>
  </g>

  <!-- ── Magenta walls (right side, framing the ship's path) ──────── -->
  <g filter="url(#magentaGlow)" opacity="0.9">
    <rect x="396" y="80"  width="22" height="124" fill="#ff2bd6" rx="6"/>
    <rect x="396" y="308" width="22" height="124" fill="#ff2bd6" rx="6"/>
  </g>
  <g>
    <rect x="396" y="80"  width="22" height="124" fill="url(#wallGrad)" rx="6"/>
    <rect x="396" y="308" width="22" height="124" fill="url(#wallGrad)" rx="6"/>
  </g>
  <!-- Bright cap highlights -->
  <g fill="#ffe8ff">
    <rect x="398" y="200" width="18" height="4" rx="2" opacity="0.95"/>
    <rect x="398" y="308" width="18" height="4" rx="2" opacity="0.95"/>
  </g>

  <!-- ── Cyan bloom halo behind ship ─────────────────────────────── -->
  <g filter="url(#bloom)">
    <circle cx="244" cy="256" r="145" fill="#00e8ff" opacity="0.30"/>
    <circle cx="244" cy="256" r="82"  fill="#aaffff" opacity="0.40"/>
  </g>

  <!-- ── PULSE expanding rings (signature ability) ───────────────── -->
  <g filter="url(#pulseGlow)">
    <circle cx="244" cy="256" r="142" fill="none" stroke="url(#pulseGrad)" stroke-width="3.5" opacity="0.85"/>
    <circle cx="244" cy="256" r="110" fill="none" stroke="#aa44ff" stroke-width="2.4" opacity="0.55"/>
  </g>

  <!-- ── Engine flame trail (long, dramatic) ─────────────────────── -->
  <ellipse cx="142" cy="256" rx="118" ry="28" fill="url(#flame)"/>
  <!-- Engine sparks behind ship -->
  <g fill="#ffffff">
    <circle cx="58"  cy="252" r="2.4" opacity="0.85"/>
    <circle cx="82"  cy="266" r="1.8" opacity="0.7"/>
    <circle cx="38"  cy="244" r="1.6" opacity="0.6"/>
    <circle cx="98"  cy="242" r="2.2" opacity="0.8"/>
    <circle cx="120" cy="270" r="1.6" opacity="0.6"/>
    <circle cx="76"  cy="238" r="1.4" opacity="0.55"/>
  </g>

  <!-- ── Ship (hero, slightly banking) ───────────────────────────── -->
  <g transform="translate(244 256) rotate(-8) scale(1.16)">
    <!-- Wings -->
    <g filter="url(#cyanGlow)">
      <path d="M-22,-32 L-92,-96 L-110,-52 L-32,-30 Z"
            fill="url(#wing)" stroke="#aaeeff" stroke-width="2.5"/>
      <path d="M-22,32  L-92,96  L-110,52  L-32,30  Z"
            fill="url(#wing)" stroke="#aaeeff" stroke-width="2.5"/>
    </g>

    <!-- Hull -->
    <path d="M110,0
             C94,-46 32,-74 -32,-74
             L-32,-30
             C6,-22 22,-4 18,0
             C22,4 6,22 -32,30
             L-32,74
             C32,74 94,46 110,0 Z"
          fill="url(#hull)" stroke="#bbf2ff" stroke-width="4"/>

    <!-- Top edge highlight -->
    <path d="M38,-50 C72,-40 92,-22 102,-2"
          fill="none" stroke="#ffffff" stroke-width="3"
          stroke-linecap="round" opacity="0.7"/>

    <!-- Cockpit dome with layered highlights -->
    <ellipse cx="42" cy="-7" rx="34" ry="22"
             fill="url(#cockpit)" stroke="#ffffff" stroke-width="1.8" opacity="0.95"/>
    <ellipse cx="48" cy="-13" rx="13" ry="6" fill="white" opacity="0.85"/>
    <ellipse cx="32" cy="-3"  rx="6"  ry="3" fill="white" opacity="0.5"/>

    <!-- Engine nozzle with intense core -->
    <circle cx="-28" cy="0" r="24" fill="#88eeff" filter="url(#cyanGlow)"/>
    <circle cx="-28" cy="0" r="14" fill="#ffffff" opacity="0.95"/>
    <circle cx="-28" cy="0" r="6"  fill="#ffffff"/>
  </g>

  <!-- ── HUD corner brackets (game-screen framing) ───────────────── -->
  <g stroke="#00e8ff" stroke-width="3" fill="none" opacity="0.55"
     stroke-linecap="round">
    <path d="M58,58  L58,90  M58,58  L90,58"/>
    <path d="M454,58  L454,90  M454,58  L422,58"/>
    <path d="M58,454 L58,422 M58,454 L90,454"/>
    <path d="M454,454 L454,422 M454,454 L422,454"/>
  </g>
</svg>
