<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVER DODGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden }
canvas { display:block }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C = document.getElementById('c');
const X = C.getContext('2d');
const VW = 800, VH = 450;
const DPR = Math.min(window.devicePixelRatio || 1, 3);
C.width  = Math.round(VW * DPR);
C.height = Math.round(VH * DPR);
X.scale(DPR, DPR);

let CSF = 1;
function resize() {
  const s = Math.min(innerWidth / VW, innerHeight / VH);
  C.style.width  = VW * s + 'px';
  C.style.height = VH * s + 'px';
  CSF = s;
}
resize();
addEventListener('resize', resize);

// ── Input ─────────────────────────────────────────────────────────────────────
const mouse = { x: VW/2, y: VH/2 };
const keys  = {};
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) / CSF;
  mouse.y = (e.clientY - r.top)  / CSF;
});
C.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = C.getBoundingClientRect(), t = e.touches[0];
  mouse.x = (t.clientX - r.left) / CSF;
  mouse.y = (t.clientY - r.top)  / CSF;
}, { passive: false });
addEventListener('keydown', e => { keys[e.code] = true;  if (e.code === 'Space') e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.code] = false; });

// ── State ─────────────────────────────────────────────────────────────────────
let gstate  = 'menu';
let score   = 0;
let hiScore = +localStorage.getItem('hd_hi') || 0;
let frame   = 0, tick = 0, spd = 3;
let shakeX  = 0, shakeY = 0;

// Player — bankAngle replaces atan2 to fix the spinning-when-stationary bug
const P = {
  x: 150, y: VH/2, vx: 0, vy: 0,
  bankAngle: 0,  // smoothly lerped from vy — never spins
  r: 10, ribbon: [], inv: 0,
};

let walls = [], enemies = [], stars = [], sparks = [], speedLines = [];

// ── Cached gradients ──────────────────────────────────────────────────────────
let bgGrad, vigGrad;
function buildGrads() {
  bgGrad = X.createLinearGradient(0, 0, 0, VH);
  bgGrad.addColorStop(0, '#050510');
  bgGrad.addColorStop(1, '#020208');
  vigGrad = X.createRadialGradient(VW/2, VH/2, VH*0.1, VW/2, VH/2, VH);
  vigGrad.addColorStop(0,    'rgba(0,0,0,0)');
  vigGrad.addColorStop(0.65, 'rgba(0,0,8,0.28)');
  vigGrad.addColorStop(1,    'rgba(0,0,18,0.88)');
}

// ── World init ────────────────────────────────────────────────────────────────
function mkStars() {
  stars = [];
  for (let i = 0; i < 140; i++) {
    const layer = i < 55 ? 0 : i < 100 ? 1 : 2;
    const bright = layer === 2 && Math.random() < 0.3;
    stars.push({
      x: Math.random() * VW, y: Math.random() * VH,
      r: [0.35, 0.8, 1.6][layer] + Math.random() * 0.35,
      s: [0.12, 0.33, 0.9][layer],
      a: [0.28, 0.52, 0.82][layer],
      twinkle: Math.random() * Math.PI * 2,
      layer, bright,
      col: bright ? `hsl(${210+Math.random()*30},65%,92%)` : layer===2 ? '#c8dff0' : '#6677aa',
    });
  }
}
function mkSpeedLines() {
  speedLines = Array.from({ length: 32 }, () => ({
    y: Math.random() * VH, x: Math.random() * VW,
    len: 50 + Math.random() * 130,
    spd: 5 + Math.random() * 7,
  }));
}

// ── Spawners ──────────────────────────────────────────────────────────────────
function addWall(startX) {
  const margin = 55, gap = Math.max(100, 200 - score * 0.15);
  const gapY = margin + Math.random() * (VH - margin*2 - gap);
  walls.push({ x: startX ?? VW+10, gapY, gap, w: 26, pulse: Math.random()*Math.PI*2 });
}
function addEnemy() {
  const seeker = Math.random() < 0.45;
  const y = 45 + Math.random() * (VH - 90);
  if (seeker) {
    enemies.push({ x: VW+15, y, vx: -(spd+0.8), vy: 0, r: 8, type: 's',
      pulse: 0, facing: Math.PI, spin: 0 });
  } else {
    enemies.push({ x: VW+15, y, vx: -(spd+2.5+Math.random()*2),
      vy: (Math.random()-.5)*2.5, r: 7, type: 'b', spin: 0 });
  }
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function startGame() {
  gstate = 'play'; score = frame = 0; spd = 3;
  P.x = 150; P.y = VH/2; P.vx = P.vy = 0; P.bankAngle = 0;
  P.ribbon = []; P.inv = 90;
  walls = []; enemies = []; sparks = [];
  mouse.x = VW/2; mouse.y = VH/2;
  for (let i = 0; i < 4; i++) addWall(VW + i*265);
}
function die() {
  gstate = 'dead';
  const s = Math.floor(score);
  if (s > hiScore) { hiScore = s; localStorage.setItem('hd_hi', s); }
  shakeX = 12; shakeY = 9;
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*Math.PI*2, v = Math.random()*8+1;
    sparks.push({ x: P.x, y: P.y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      life: 1, sz: 1+Math.random()*5,
      hue: [185,195,210,35,50][Math.floor(Math.random()*5)] });
  }
}
function handleAction() { if (gstate !== 'play') startGame(); }
C.addEventListener('click',    handleAction);
C.addEventListener('touchend', e => { e.preventDefault(); handleAction(); });
addEventListener('keydown',    e => { if (e.code === 'Space') handleAction(); });

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  tick++;
  shakeX *= 0.70; shakeY *= 0.70;
  if (Math.abs(shakeX) < 0.05) shakeX = 0;
  if (Math.abs(shakeY) < 0.05) shakeY = 0;

  const ws = gstate === 'play' ? spd : 2;
  for (const s of stars) {
    s.x -= s.s * (ws/3); s.twinkle += 0.025;
    if (s.x < 0) { s.x = VW; s.y = Math.random()*VH; }
  }
  for (const sl of speedLines) {
    sl.x -= sl.spd * (ws/3);
    if (sl.x + sl.len < 0) { sl.x = VW + sl.len; sl.y = Math.random()*VH; }
  }

  if (gstate !== 'play') return;
  frame++; score += 1/60;
  spd = Math.min(10, 3 + Math.sqrt(score)*0.35);

  // Player movement
  P.vx += (mouse.x - P.x) * 0.07;
  P.vy += (mouse.y - P.y) * 0.07;
  if (keys['ArrowUp']    || keys['KeyW']) P.vy -= 0.8;
  if (keys['ArrowDown']  || keys['KeyS']) P.vy += 0.8;
  if (keys['ArrowLeft']  || keys['KeyA']) P.vx -= 0.4;
  if (keys['ArrowRight'] || keys['KeyD']) P.vx += 0.4;
  P.vx *= 0.80; P.vy *= 0.80;
  const vm = Math.hypot(P.vx, P.vy);
  if (vm > 11) { P.vx = P.vx/vm*11; P.vy = P.vy/vm*11; }
  P.x = Math.max(P.r, Math.min(VW-P.r, P.x+P.vx));
  P.y = Math.max(P.r, Math.min(VH-P.r, P.y+P.vy));

  // *** Rotation fix: bank angle based on vertical velocity only ***
  // Ship always faces right; tilts up/down with vy. Never spins when stationary.
  const bankTarget = Math.max(-0.40, Math.min(0.40, P.vy * 0.052));
  P.bankAngle += (bankTarget - P.bankAngle) * 0.10;

  // Ribbon trail
  P.ribbon.push({ x: P.x, y: P.y });
  if (P.ribbon.length > 30) P.ribbon.shift();

  // Walls
  const spacing = Math.max(190, 265 - score*0.4);
  if (!walls.length || walls[walls.length-1].x < VW-spacing) addWall();
  for (const w of walls) { w.x -= spd; w.pulse += 0.042; }
  walls = walls.filter(w => w.x + w.w > -10);

  // Enemies
  const eInterval = Math.max(70, 220 - score);
  if (frame % Math.round(eInterval) === 0) addEnemy();
  for (const e of enemies) {
    e.spin += e.type === 'b' ? 0.17 : 0.05;
    if (e.type === 's') {
      const dx = P.x-e.x, dy = P.y-e.y, d = Math.max(1, Math.hypot(dx, dy));
      e.vx += dx/d*0.13; e.vy += dy/d*0.13;
      const em = Math.hypot(e.vx, e.vy), cap = spd+1.8;
      if (em > cap) { e.vx=e.vx/em*cap; e.vy=e.vy/em*cap; }
      e.pulse += 0.08;
      // Smooth facing toward player
      const tf = Math.atan2(dy, dx);
      let df = tf - e.facing;
      while (df >  Math.PI) df -= Math.PI*2;
      while (df < -Math.PI) df += Math.PI*2;
      e.facing += df * 0.09;
    }
    e.x += e.vx; e.y += e.vy;
  }
  enemies = enemies.filter(e => e.x>-60 && e.x<VW+70 && e.y>-60 && e.y<VH+60);

  if (P.inv > 0) { P.inv--; return; }
  for (const w of walls)
    if (P.x+P.r>w.x && P.x-P.r<w.x+w.w)
      if (P.y-P.r<w.gapY || P.y+P.r>w.gapY+w.gap) { die(); return; }
  for (const e of enemies)
    if (Math.hypot(P.x-e.x, P.y-e.y) < P.r+e.r) { die(); return; }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
const ADD = () => X.globalCompositeOperation = 'lighter';
const NRM = () => X.globalCompositeOperation = 'source-over';

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
  const sx = shakeX*(Math.random()*2-1), sy = shakeY*(Math.random()*2-1);
  X.save();
  X.translate(sx, sy);

  // Background
  X.fillStyle = bgGrad;
  X.fillRect(-16, -16, VW+32, VH+32);
  drawNebula();
  drawGrid();
  drawStars();

  if (gstate !== 'menu') {
    drawSpeedLines();
    drawWalls();
    drawEnemies();
    drawRibbon();
    if (!(P.inv > 0 && tick % 6 < 3)) drawShip();
    drawSparks();
  }

  X.restore();

  // Screen-space (no shake)
  X.fillStyle = vigGrad;
  X.fillRect(0, 0, VW, VH);

  if (gstate === 'menu') { drawMenu(); return; }
  drawHUD();
  if (gstate === 'dead') drawDead();
}

// ── Scene layers ──────────────────────────────────────────────────────────────
function drawNebula() {
  ADD();
  const clouds = [
    { x:160, y:70,  r:290, c:'#3311aa', a:0.022 },
    { x:660, y:370, r:260, c:'#001f88', a:0.018 },
    { x:400, y:220, r:200, c:'#003355', a:0.014 },
  ];
  for (const n of clouds) {
    X.globalAlpha = n.a;
    const g = X.createRadialGradient(n.x, n.y, 8, n.x, n.y, n.r);
    g.addColorStop(0, n.c); g.addColorStop(1, 'rgba(0,0,0,0)');
    X.fillStyle = g; X.fillRect(0, 0, VW, VH);
  }
  X.globalAlpha = 1; NRM();
}

function drawGrid() {
  const ox = (gstate === 'play' ? frame*spd*0.32 : tick*0.55) % 80;
  X.strokeStyle = 'rgba(38,62,155,0.062)';
  X.lineWidth = 0.5;
  X.beginPath();
  for (let x = -ox; x < VW+80; x += 80) { X.moveTo(x, 0); X.lineTo(x, VH); }
  for (let y = 0; y < VH; y += 60)       { X.moveTo(0, y); X.lineTo(VW, y); }
  X.stroke();
}

function drawStars() {
  for (const s of stars) {
    const a = s.bright ? s.a*(0.72+Math.sin(s.twinkle)*0.28) : s.a;
    X.globalAlpha = a;
    if (s.layer === 2) { ADD(); X.shadowColor = s.col; X.shadowBlur = s.bright ? 6 : 2; }
    X.fillStyle = s.col;
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, Math.PI*2); X.fill();
    if (s.layer === 2) { X.shadowBlur = 0; NRM(); }
  }
  X.globalAlpha = 1;
}

function drawSpeedLines() {
  const t = Math.max(0, (spd-4.0)/6.0);
  if (t < 0.02) return;
  ADD(); X.globalAlpha = t * 0.48;
  X.strokeStyle = '#99ccff'; X.lineWidth = 0.65;
  X.beginPath();
  for (const sl of speedLines) {
    X.moveTo(sl.x, sl.y);
    X.lineTo(sl.x + sl.len * Math.min(1, t*1.5), sl.y);
  }
  X.stroke();
  X.globalAlpha = 1; NRM();
}

function drawWalls() {
  for (const w of walls) {
    // Dark body with gradient
    const bg = X.createLinearGradient(w.x, 0, w.x+w.w, 0);
    bg.addColorStop(0,   '#0e0c38');
    bg.addColorStop(0.5, '#130f4a');
    bg.addColorStop(1,   '#090720');
    X.fillStyle = bg;
    X.fillRect(w.x, 0, w.w, w.gapY);
    X.fillRect(w.x, w.gapY+w.gap, w.w, VH-w.gapY-w.gap);
    // Interior stripes
    X.strokeStyle = 'rgba(70,50,200,0.09)'; X.lineWidth = 0.6;
    X.beginPath();
    for (let dy = 18; dy < w.gapY-4; dy += 20) {
      X.moveTo(w.x+3, dy); X.lineTo(w.x+w.w-3, dy);
    }
    for (let dy = w.gapY+w.gap+18; dy < VH-4; dy += 20) {
      X.moveTo(w.x+3, dy); X.lineTo(w.x+w.w-3, dy);
    }
    X.stroke();

    // Gap edge — 5-pass additive bloom
    const p = 0.68 + Math.sin(w.pulse)*0.32;
    ADD();
    const passes = [
      { dy:-12, h:12, c:'#441188', a:0.07*p },
      { dy:-7,  h:7,  c:'#6633cc', a:0.14*p },
      { dy:-3,  h:3,  c:'#9966ee', a:0.30*p },
      { dy:-1.5,h:3,  c:'#ccaaff', a:0.65*p },
      { dy:-0.8,h:1.6,c:'#ffffff', a:p },
    ];
    for (const { dy, h, c, a } of passes) {
      X.globalAlpha = a; X.fillStyle = c;
      X.fillRect(w.x, w.gapY+dy, w.w, h);
      X.fillRect(w.x, w.gapY+w.gap+dy+h-h, w.w, h); // mirror bottom
    }
    // fix bottom mirror properly
    X.globalAlpha = 0.07*p; X.fillStyle = '#441188';
    X.fillRect(w.x, w.gapY+w.gap,    w.w, 12);
    X.globalAlpha = 0.14*p; X.fillStyle = '#6633cc';
    X.fillRect(w.x, w.gapY+w.gap,    w.w, 7);
    X.globalAlpha = 0.30*p; X.fillStyle = '#9966ee';
    X.fillRect(w.x, w.gapY+w.gap,    w.w, 3);
    X.globalAlpha = 0.65*p; X.fillStyle = '#ccaaff';
    X.fillRect(w.x, w.gapY+w.gap-0.5, w.w, 3);
    X.globalAlpha = p;      X.fillStyle = '#ffffff';
    X.fillRect(w.x+3, w.gapY+w.gap-0.8, w.w-6, 1.6);
    X.globalAlpha = 1; NRM();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    X.save();
    X.translate(e.x, e.y);

    if (e.type === 'b') {
      // Plasma orb — no directional rotation, just spins in place
      // Outer soft halo
      ADD();
      X.globalAlpha = 0.13;
      let g = X.createRadialGradient(0,0,0,0,0,22);
      g.addColorStop(0,'#ff5500'); g.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=g; X.beginPath(); X.arc(0,0,22,0,Math.PI*2); X.fill();
      // Two spinning orbit arcs
      X.globalAlpha = 0.6;
      X.strokeStyle = '#ff7744'; X.lineWidth = 1.8;
      X.beginPath(); X.arc(0,0,12, e.spin, e.spin+Math.PI*1.4); X.stroke();
      X.beginPath(); X.arc(0,0, 8, e.spin+Math.PI, e.spin+Math.PI*2.3); X.stroke();
      X.globalAlpha = 1; NRM();
      // Core radial gradient
      const cg = X.createRadialGradient(0,0,0,0,0,9);
      cg.addColorStop(0,  '#ffffff');
      cg.addColorStop(0.2,'#ffeeaa');
      cg.addColorStop(0.6,'#ff5522');
      cg.addColorStop(1,  'rgba(180,30,0,0)');
      X.fillStyle = cg;
      X.beginPath(); X.arc(0,0,9,0,Math.PI*2); X.fill();

    } else {
      // Seeker — smooth rotation toward player (set in update via e.facing)
      X.rotate(e.facing);
      const p = 0.68 + Math.sin(e.pulse)*0.32;
      // Dashed orbit ring
      ADD();
      X.globalAlpha = 0.12*p;
      X.strokeStyle = '#ff9900'; X.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const a = e.spin + i*Math.PI/3;
        X.beginPath(); X.arc(0,0,17, a, a+0.5); X.stroke();
      }
      // Wing fins
      X.globalAlpha = 1; NRM();
      X.fillStyle = '#883300';
      X.beginPath(); X.moveTo(1,-3); X.lineTo(-8,-13); X.lineTo(-11,-6); X.closePath(); X.fill();
      X.beginPath(); X.moveTo(1, 3); X.lineTo(-8, 13); X.lineTo(-11, 6); X.closePath(); X.fill();
      // Body with glow
      ADD();
      X.globalAlpha = 0.18*p;
      let bg = X.createRadialGradient(0,0,0,0,0,15);
      bg.addColorStop(0,'#ffaa00'); bg.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=bg; X.beginPath(); X.arc(0,0,15,0,Math.PI*2); X.fill();
      X.globalAlpha = 1; NRM();
      X.fillStyle = '#ff9900';
      X.beginPath();
      X.moveTo(13,0); X.lineTo(-5,-8); X.lineTo(-2,-3);
      X.lineTo(-5,0); X.lineTo(-2, 3); X.lineTo(-5, 8);
      X.closePath(); X.fill();
      // Eye
      ADD(); X.globalAlpha = 0.9*p;
      X.shadowColor = '#ffff00'; X.shadowBlur = 10;
      X.fillStyle = '#ffff55';
      X.beginPath(); X.arc(5,0,2.5,0,Math.PI*2); X.fill();
      X.shadowBlur = 0; X.globalAlpha = 1; NRM();
    }

    X.restore();
  }
}

function drawRibbon() {
  const pts = P.ribbon;
  if (pts.length < 3) return;
  const n = pts.length;
  ADD();
  X.lineCap = 'round'; X.lineJoin = 'round';
  // 4 layered passes: wide+dim → narrow+bright
  for (const [wid, alp, col] of [
    [13, 0.022, '#001e55'],
    [6,  0.065, '#0055bb'],
    [3,  0.20,  '#0099ff'],
    [1.2,0.60,  '#55ddff'],
  ]) {
    X.beginPath();
    X.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < n; i++) {
      const p0 = pts[Math.max(0,i-2)], p1 = pts[i-1];
      const p2 = pts[i], p3 = pts[Math.min(n-1,i+1)];
      X.bezierCurveTo(
        p1.x+(p2.x-p0.x)/6, p1.y+(p2.y-p0.y)/6,
        p2.x-(p3.x-p1.x)/6, p2.y-(p3.y-p1.y)/6,
        p2.x, p2.y
      );
    }
    X.strokeStyle = col; X.lineWidth = wid; X.globalAlpha = alp;
    X.stroke();
  }
  X.globalAlpha = 1; NRM();
}

function drawShip() {
  const hover = Math.sin(tick*0.067)*1.7;
  X.save();
  X.translate(P.x, P.y + hover);
  X.rotate(P.bankAngle); // bank-only rotation — no spinning

  // Ambient halo
  ADD(); X.globalAlpha = 0.09;
  let h = X.createRadialGradient(0,0,5,0,0,36);
  h.addColorStop(0,'#00aaff'); h.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=h; X.beginPath(); X.arc(0,0,36,0,Math.PI*2); X.fill();
  X.globalAlpha = 1; NRM();

  // Engine flame (bezier, additive)
  const fl = 10 + Math.abs(Math.sin(tick*0.52))*7 + Math.hypot(P.vx,P.vy)*0.42;
  ADD(); X.globalAlpha = 0.75;
  const fg = X.createLinearGradient(-5,0,-5-fl,0);
  fg.addColorStop(0,  'rgba(140,210,255,1)');
  fg.addColorStop(0.3,'rgba(50,130,255,0.7)');
  fg.addColorStop(1,  'rgba(0,40,180,0)');
  X.fillStyle = fg;
  X.beginPath(); X.moveTo(-5,-3); X.quadraticCurveTo(-5-fl*0.55,0,-5-fl,0); X.lineTo(-5,3); X.fill();
  X.globalAlpha = 1; NRM();

  // Wings (behind hull)
  X.fillStyle = '#004f80';
  X.beginPath(); X.moveTo(2,-5); X.lineTo(-9,-16); X.lineTo(-13,-8); X.lineTo(-9,-9); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(2, 5); X.lineTo(-9, 16); X.lineTo(-13, 8); X.lineTo(-9, 9); X.closePath(); X.fill();

  // Hull body with smooth bezier curves
  const hg = X.createLinearGradient(-9,-9,9,7);
  hg.addColorStop(0,  '#c4f0ff');
  hg.addColorStop(0.4,'#00ccff');
  hg.addColorStop(0.8,'#0088cc');
  hg.addColorStop(1,  '#004488');
  X.fillStyle = hg;
  X.beginPath();
  X.moveTo(17,0);
  X.bezierCurveTo(14,-4,-1,-9,-9,-9);
  X.lineTo(-9,-5.5);
  X.bezierCurveTo(-6,-5,-3,-2,-5,0);
  X.bezierCurveTo(-3, 2,-6, 5,-9, 5.5);
  X.lineTo(-9,9);
  X.bezierCurveTo(-1,9,14,4,17,0);
  X.closePath(); X.fill();

  // Panel lines
  X.strokeStyle = 'rgba(0,45,70,0.45)'; X.lineWidth = 0.7;
  X.beginPath();
  X.moveTo(8,-1.5); X.lineTo(-3,-5.5);
  X.moveTo(8, 1.5); X.lineTo(-3, 5.5);
  X.stroke();

  // Cockpit with radial gradient
  const cg = X.createRadialGradient(6,-1.5,0,5,0,8);
  cg.addColorStop(0,   '#ffffff');
  cg.addColorStop(0.35,'#c0eaff');
  cg.addColorStop(0.8, '#3d80a0');
  cg.addColorStop(1,   '#1a3a50');
  X.fillStyle = cg;
  X.beginPath(); X.ellipse(5,0,7,4.2,0,0,Math.PI*2); X.fill();
  X.fillStyle = 'rgba(255,255,255,0.45)';
  X.beginPath(); X.ellipse(6.5,-1.2,3,1.4,-0.25,0,Math.PI*2); X.fill();

  // Engine nozzle glow (additive)
  const ne = 3.5 + Math.abs(Math.sin(tick*0.44))*2;
  ADD(); X.globalAlpha = 0.88;
  X.shadowColor = '#44aaff'; X.shadowBlur = 14;
  const eg = X.createRadialGradient(-14,0,0,-14,0,ne+4);
  eg.addColorStop(0,'#cceeff'); eg.addColorStop(1,'rgba(0,60,200,0)');
  X.fillStyle=eg; X.beginPath(); X.arc(-14,0,ne+4,0,Math.PI*2); X.fill();
  X.shadowBlur = 0; X.globalAlpha = 1; NRM();

  X.restore();
}

function drawSparks() {
  ADD();
  sparks = sparks.filter(s => {
    s.x+=s.vx; s.y+=s.vy; s.vx*=0.92; s.vy*=0.92; s.life-=0.014;
    X.globalAlpha = Math.pow(s.life,1.3);
    const g = X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*1.6);
    g.addColorStop(0,  `hsl(${s.hue},100%,95%)`);
    g.addColorStop(0.3,`hsl(${s.hue},100%,60%)`);
    g.addColorStop(1,  'rgba(0,0,0,0)');
    X.fillStyle=g; X.beginPath(); X.arc(s.x,s.y,s.sz*1.6,0,Math.PI*2); X.fill();
    return s.life > 0;
  });
  X.globalAlpha=1; NRM();
}

// ── UI ────────────────────────────────────────────────────────────────────────
function drawHUD() {
  X.textAlign = 'left';
  X.shadowColor='#00e8ff'; X.shadowBlur=14; X.fillStyle='#00e8ff';
  X.font='bold 22px monospace'; X.fillText(`SCORE  ${Math.floor(score)}`,18,34);
  X.shadowColor='#ffdd44'; X.shadowBlur=8;  X.fillStyle='#ffdd44';
  X.font='bold 16px monospace'; X.fillText(`BEST   ${hiScore}`,18,56);
  const bw=110, bf=Math.max(0,(spd-3)/7)*bw;
  X.shadowBlur=0; X.fillStyle='rgba(255,255,255,0.06)'; X.fillRect(18,64,bw,5);
  const hu=210-(spd-3)/7*140;
  X.shadowColor=`hsl(${hu},100%,60%)`; X.shadowBlur=7;
  X.fillStyle=`hsl(${hu},100%,62%)`; X.fillRect(18,64,bf,5);
  X.shadowBlur=0; X.fillStyle=`hsla(${hu},70%,75%,0.65)`;
  X.font='10px monospace'; X.fillText('SPD',18+bw+5,70);
}

function drawMenu() {
  // Animated preview ship
  X.save();
  X.translate(VW/2+Math.sin(tick*0.022)*16, VH/2+115+Math.sin(tick*0.04)*8);
  X.scale(1.65,1.65);
  ADD(); X.globalAlpha=0.10;
  let ah=X.createRadialGradient(0,0,5,0,0,34);
  ah.addColorStop(0,'#00aaff'); ah.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=ah; X.beginPath(); X.arc(0,0,34,0,Math.PI*2); X.fill();
  X.globalAlpha=1; NRM();
  const hg=X.createLinearGradient(-9,-9,9,7);
  hg.addColorStop(0,'#c4f0ff'); hg.addColorStop(0.4,'#00ccff'); hg.addColorStop(1,'#004488');
  X.fillStyle=hg;
  X.beginPath(); X.moveTo(17,0); X.bezierCurveTo(14,-4,-1,-9,-9,-9);
  X.lineTo(-9,-5.5); X.bezierCurveTo(-6,-5,-3,-2,-5,0);
  X.bezierCurveTo(-3,2,-6,5,-9,5.5); X.lineTo(-9,9);
  X.bezierCurveTo(-1,9,14,4,17,0); X.closePath(); X.fill();
  X.fillStyle='#004f80';
  X.beginPath(); X.moveTo(2,-5); X.lineTo(-9,-16); X.lineTo(-13,-8); X.lineTo(-9,-9); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(2, 5); X.lineTo(-9, 16); X.lineTo(-13, 8); X.lineTo(-9, 9); X.closePath(); X.fill();
  const cg=X.createRadialGradient(6,-1.5,0,5,0,8);
  cg.addColorStop(0,'#fff'); cg.addColorStop(0.5,'#bbeeff'); cg.addColorStop(1,'#1a3a50');
  X.fillStyle=cg; X.beginPath(); X.ellipse(5,0,7,4.2,0,0,Math.PI*2); X.fill();
  const fl2=10+Math.abs(Math.sin(tick*0.5))*6;
  ADD(); X.globalAlpha=0.72;
  const fg2=X.createLinearGradient(-5,0,-5-fl2,0);
  fg2.addColorStop(0,'rgba(140,210,255,1)'); fg2.addColorStop(1,'rgba(0,40,180,0)');
  X.fillStyle=fg2; X.beginPath(); X.moveTo(-5,-3); X.quadraticCurveTo(-5-fl2*0.55,0,-5-fl2,0); X.lineTo(-5,3); X.fill();
  X.globalAlpha=1; NRM();
  X.restore();

  X.textAlign='center';
  X.shadowColor='#00ffff'; X.shadowBlur=52; X.fillStyle='#00ffff';
  X.font='bold 62px monospace'; X.fillText('HOVER DODGE',VW/2,VH/2-70);
  X.shadowColor='#8899ff'; X.shadowBlur=14; X.fillStyle='#99aaff';
  X.font='21px monospace'; X.fillText('壁と敵をよけ続けろ！',VW/2,VH/2-18);
  X.shadowBlur=0; X.fillStyle='rgba(145,165,205,0.58)';
  X.font='14px monospace'; X.fillText('マウス移動 / 矢印キーで操作',VW/2,VH/2+20);
  const p=0.5+Math.sin(tick*0.06)*0.5;
  X.globalAlpha=p; X.shadowColor='#ffffff'; X.shadowBlur=16; X.fillStyle='#ffffff';
  X.font='bold 19px monospace'; X.fillText('クリック または SPACE でスタート',VW/2,VH/2+58);
  X.globalAlpha=1; X.shadowBlur=0;
  if (hiScore>0) {
    X.shadowColor='#ffdd44'; X.shadowBlur=10; X.fillStyle='#ffdd44';
    X.font='16px monospace'; X.fillText(`ベストスコア:  ${hiScore} 秒`,VW/2,VH/2+98);
    X.shadowBlur=0;
  }
  X.textAlign='left';
}

function drawDead() {
  X.fillStyle='rgba(0,0,14,0.62)'; X.fillRect(0,0,VW,VH);
  X.textAlign='center';
  X.shadowColor='#ff2222'; X.shadowBlur=52; X.fillStyle='#ff5555';
  X.font='bold 58px monospace'; X.fillText('GAME OVER',VW/2,VH/2-52);
  X.shadowBlur=0; X.fillStyle='rgba(160,185,215,0.68)';
  X.font='17px monospace'; X.fillText('スコア',VW/2,VH/2-12);
  X.shadowColor='#ffffff'; X.shadowBlur=14; X.fillStyle='#ffffff';
  X.font='bold 32px monospace'; X.fillText(`${Math.floor(score)} 秒`,VW/2,VH/2+22);
  if (Math.floor(score)>=hiScore && hiScore>0) {
    const rp=0.7+Math.sin(tick*0.1)*0.3;
    X.globalAlpha=rp; X.shadowColor='#ffee44'; X.shadowBlur=24; X.fillStyle='#ffee55';
    X.font='bold 22px monospace'; X.fillText('★  NEW RECORD  ★',VW/2,VH/2+62);
    X.globalAlpha=1;
  }
  const ep=0.5+Math.sin(tick*0.055)*0.5;
  X.globalAlpha=ep; X.shadowColor='#aaffaa'; X.shadowBlur=10; X.fillStyle='#aaffaa';
  X.font='18px monospace'; X.fillText('クリック または SPACE でリトライ',VW/2,VH/2+105);
  X.globalAlpha=1; X.shadowBlur=0; X.textAlign='left';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
buildGrads();
mkStars();
mkSpeedLines();
(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
